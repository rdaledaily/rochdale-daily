name: Install quality journalism and reader features

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rochdale-daily-quality-journalism-install
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: "gpt-4o-mini"
      MAX_AI_ARTICLES_PER_RUN: "90"
      MAX_AI_ARTICLES_INITIAL: "120"
      AI_WORKERS: "4"
      MAX_NEWS_AGE_HOURS: "168"
      ARTICLE_RETENTION_DAYS: "14"
      MAX_PUBLISHED_ARTICLES: "180"
      MIN_LIVE_STORIES: "40"
      MIN_BALANCED_SELECTION_LIMIT: "40"
      REQUEST_TIMEOUT: "20"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Verify OpenAI connection
        shell: bash
        run: |
          test -n "$OPENAI_API_KEY" || { echo "OPENAI_API_KEY is missing from repository secrets"; exit 1; }
          python - <<'PY'
          import os
          from openai import OpenAI
          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          response = client.chat.completions.create(
              model=os.environ.get("OPENAI_MODEL", "gpt-4o-mini"),
              messages=[{"role": "user", "content": "Reply with exactly: OPENAI CONNECTED"}],
              temperature=0,
              max_tokens=12,
          )
          content = (response.choices[0].message.content or "").strip()
          if "OPENAI CONNECTED" not in content.upper():
              raise SystemExit("OpenAI returned an unexpected preflight response: " + content)
          print("OpenAI connection verified successfully.")
          PY

