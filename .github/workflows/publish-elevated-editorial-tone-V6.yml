      - name: Audit certified articles without blocking valid edits
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          frontpage = json.loads(Path("articles/frontpage.json").read_text(encoding="utf-8"))

          if len(frontpage.get("articles", [])) < 30:
              raise SystemExit("Front page contains fewer than 30 stories.")

          certified = [
              article for article in articles
              if article.get("editorial_style_version") == "rochdale-broadsheet-v3"
          ]
          retry = [
              article for article in articles
              if article.get("style_rewrite_status") == "needs-editorial-retry"
          ]

          weak_re = re.compile(
              r"\b(?:rochdale is gearing up|residents are advised|"
              r"this is significant for local residents|a perfect opportunity|"
              r"stay informed about|plan their journeys accordingly|"
              r"positively impact the local economy)\b",
              re.I,
          )
          wrongly_certified = [
              article.get("title", "Untitled")
              for article in certified
              if weak_re.search(
                  " ".join(
                      str(article.get(field) or "")
                      for field in ("title", "excerpt", "content_html")
                  )
              )
          ]
          if wrongly_certified:
              raise SystemExit(
                  "A formulaic article was incorrectly certified: "
                  + "; ".join(wrongly_certified[:10])
              )

          if not certified:
              raise SystemExit("No articles passed the V6 professional style edit.")

          print(
              f"Certified {len(certified)} articles in V6 house style; "
              f"{len(retry)} remain eligible for a later editorial retry; "
              f"front page contains {len(frontpage.get('articles', []))} stories."
          )
          PY

