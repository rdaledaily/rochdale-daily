name: Publish elevated editorial tone V6

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rochdale-daily-editorial-tone-v6
  cancel-in-progress: false

jobs:
  elevate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: "gpt-4o-mini"
      OPENAI_STYLE_MODEL: "gpt-4o-mini"
      STYLE_REWRITE_WORKERS: "4"
      STYLE_REWRITE_LIMIT: "180"
      ARTICLE_RETENTION_DAYS: "14"
      MAX_PUBLISHED_ARTICLES: "180"
      REQUEST_TIMEOUT: "20"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Verify OpenAI editorial connection
        shell: bash
        run: |
          test -n "$OPENAI_API_KEY" || { echo "OPENAI_API_KEY is missing"; exit 1; }
          python - <<'PY'
          import os
          from openai import OpenAI

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          response = client.chat.completions.create(
              model=os.environ.get("OPENAI_STYLE_MODEL", "gpt-4o-mini"),
              messages=[{"role": "user", "content": "Reply exactly: EDITORIAL DESK READY"}],
              temperature=0,
              max_tokens=12,
          )
          answer = (response.choices[0].message.content or "").strip().upper()
          if "EDITORIAL DESK READY" not in answer:
              raise SystemExit("Unexpected OpenAI response: " + answer)
          print("OpenAI editorial connection verified.")
          PY

