        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add             articles.json             scraper_status.json             articles/frontpage.json             articles             sitemap.xml             assets/img/generated || true

          if git diff --cached --quiet; then
            echo "No article-language changes to commit."
            exit 0
          fi

          git commit -m "Publish professionally edited Rochdale Daily articles"
          git pull --rebase origin main
          git push origin HEAD:main
