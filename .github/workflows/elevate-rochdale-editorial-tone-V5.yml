      - name: Test style rules
        shell: bash
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")
          from house_style import style_issues

          weak = {
              "title": "Traffic Update: Rochdale Roads",
              "excerpt": "Residents are advised to stay informed.",
              "paragraphs": [
                  "Rochdale is currently experiencing delays.",
                  "This is significant for local residents.",
                  "Drivers should plan their journeys accordingly.",
                  "Local authorities are actively monitoring the situation.",
                  "The update will positively impact the local economy.",
              ],
          }
          strong = {
              "title": "Middleton collision leaves police officer in hospital",
              "excerpt": "A police officer was taken to hospital after a collision in Middleton, with the incident expected to affect traffic through the surrounding area.",
              "paragraphs": [
                  "A police officer was taken to hospital following a collision in Middleton.",
                  "The incident involved a police van and was reported on Thursday evening.",
                  "Emergency services attended the scene while the circumstances were examined.",
                  "For motorists using nearby routes, the response was likely to mean slower journeys and temporary disruption.",
                  "Further details will depend on the outcome of the official inquiry.",
              ],
          }
          assert style_issues(weak)
          assert not style_issues(strong), style_issues(strong)
          print("Professional house-style tests passed.")
          PY

      - name: Commit permanent house-style code
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add             scraper/house_style.py             scraper/elevate_existing_articles.py             scraper/editorial_upgrade.py             scraper/scraper.py
          if ! git diff --cached --quiet; then
            git commit -m "Install professional British editorial house style"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "Professional house style is already installed."
          fi

      - name: Elevate existing article language
        run: |
          python scraper/elevate_existing_articles.py

      - name: Rebuild front page and article pages
        run: |
          python scraper/generate_pages.py

      - name: Audit editorial output
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          frontpage = json.loads(Path("articles/frontpage.json").read_text(encoding="utf-8"))

          if len(frontpage.get("articles", [])) < 30:
              raise SystemExit("Front page contains fewer than 30 stories.")

          styled = [
              article for article in articles
              if str(article.get("source_kind") or "article").lower() != "event"
              and article.get("editorial_style_version") == "rochdale-broadsheet-v2"
          ]
          if not styled:
              raise SystemExit("No articles received the professional house style.")

          weak_re = re.compile(
              r"\b(?:rochdale is gearing up|residents are advised|"
              r"this is significant for local residents|a perfect opportunity|"
              r"stay informed about|plan their journeys accordingly|"
              r"positively impact the local economy)\b",
              re.I,
          )
          remaining = [
              article.get("title", "Untitled")
              for article in styled
              if weak_re.search(
                  " ".join(
                      str(article.get(field) or "")
                      for field in ("title", "excerpt", "content_html")
                  )
              )
          ]
          if remaining:
              raise SystemExit(
                  "Formulaic language remains in styled articles: "
                  + "; ".join(remaining[:10])
              )

          print(
              f"Audited {len(styled)} professionally restyled articles and "
              f"{len(frontpage.get('articles', []))} front-page stories."
          )
          PY

      - name: Commit elevated articles
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add             articles.json             scraper_status.json             articles/frontpage.json             articles             sitemap.xml             assets/img/generated || true

          if git diff --cached --quiet; then
            echo "No article-language changes to commit."
            exit 0
          fi

          git commit -m "Elevate Rochdale Daily article language and tone"
          git pull --rebase origin main
          git push origin HEAD:main
