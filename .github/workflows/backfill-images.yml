name: Backfill article images

# Sweeps every published article for a missing real publisher image and
# tries to obtain one, then regenerates the static pages so the backfilled
# images actually show up on the live site (not just in articles.json).
#
# This runs on a schedule -- not just once -- because it does two jobs:
#   1. a one-off backfill for every article already published before the
#      per-run image fix in rewrite_candidate() existed;
#   2. an ongoing safety net for future articles: rewrite_candidate()'s own
#      backfill attempt only gets one try per article, at the moment it's
#      rewritten, so an article that lost that one attempt to a transient
#      network error (a timeout, a momentarily-down publisher) would
#      otherwise be stuck on its stock image forever. This workflow keeps
#      retrying it on every scheduled run until it succeeds.
#
# A single run only attempts a capped number of fresh page-metadata fetches
# (see MAX_FETCH_ATTEMPTS_PER_RUN in backfill_images.py), so a large backlog
# is worked through over a few runs rather than one long one; nothing is
# lost between runs.

on:
  schedule:
    # Once daily, well clear of the 15-minute scraper's own :07/:22/:37/:52
    # schedule marks.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Shares the scraper's own lock rather than a separate concurrency group.
# This workflow writes articles.json and assets/img/generated just like the
# scraper does; giving it an independent lock (the way remove-story.yml
# does, deliberately, for takedowns) would make it a fourth writer able to
# race the others -- exactly the kind of overlap that previously corrupted
# event publication dates before the event_dates.json ledger fix. Sharing
# the lock means it simply queues behind an in-progress scrape or publish
# instead of racing it.
concurrency:
  group: rochdale-daily-15-minute-scraper
  cancel-in-progress: false

jobs:
  backfill-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir "Pillow>=10,<13"

      - name: Backfill missing article images
        env:
          USE_SOURCE_IMAGES: "true"
          REQUEST_TIMEOUT: "20"
        run: |
          python scraper/backfill_images.py

      - name: Validate feed and regenerate static pages
        run: |
          python -m json.tool articles.json > /dev/null
          python scraper/article_gate.py articles.json
          python scraper/generate_pages.py

      - name: Commit backfilled images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add articles.json scraper_status.json event_dates.json assets/img/generated articles sitemap.xml

          if git diff --cached --quiet; then
            echo "No images needed backfilling this run."
            exit 0
          fi

          git commit -m "Backfill missing article images"

          # articles.json is machine-generated whole-file state, so a plain
          # rebase can never resolve a conflict in it; merge origin instead
          # and resolve the feed with the pipeline's own story-aware merger,
          # same as every other workflow that writes this file.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); merging origin/${GITHUB_REF_NAME}."
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git merge --no-edit "origin/${GITHUB_REF_NAME}"; then
              if git ls-files -u -- articles.json | grep -q .; then
                git show ":2:articles.json" > /tmp/local_articles.json
                git show ":3:articles.json" > /tmp/remote_articles.json
                python scraper/merge_feeds.py /tmp/remote_articles.json /tmp/local_articles.json articles.json
                git add articles.json
              fi
              conflicted=$(git diff --name-only --diff-filter=U)
              if [ -n "${conflicted}" ]; then
                echo "${conflicted}" | while read -r file; do
                  git checkout --ours -- "${file}" 2>/dev/null || git rm -q -- "${file}"
                  git add -- "${file}" 2>/dev/null || true
                done
              fi
              git commit --no-edit
            fi
          done
          echo "Failed to push after 5 attempts."
          exit 1
