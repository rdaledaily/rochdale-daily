name: Fix over-strict article rewrite rejection

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rochdale-daily-rewrite-repair
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Patch rewrite validation and source enrichment
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          path = Path("scraper/scraper.py")
          text = path.read_text(encoding="utf-8")

          start_marker = "def draft_quality_issues("
          end_marker = "\ndef article_is_low_quality("
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit("Could not locate the current rewrite-quality block; no changes made.")

          replacement = base64.b64decode("").decode("utf-8")
          text = text[:start] + replacement + "\n" + text[end + 1:]

          rewrite_start = text.find("def rewrite_candidate(")
          source_records_marker = "\n    source_records = [{"
          source_records_at = text.find(source_records_marker, rewrite_start)
          if rewrite_start < 0 or source_records_at < 0:
              raise SystemExit("Could not locate rewrite_candidate source-record creation.")

          rewrite_prefix = text[rewrite_start:source_records_at]
          if "enrich_candidate_for_rewrite(candidate)" not in rewrite_prefix:
              text = (
                  text[:source_records_at]
                  + "\n    enrich_candidate_for_rewrite(candidate)"
                  + text[source_records_at:]
              )

          path.write_text(text, encoding="utf-8")
          print("Patched scraper/scraper.py")

          PY

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate patched rewrite logic
        shell: bash
        run: |
          python -m py_compile scraper/scraper.py
          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")
          import scraper

          candidate = scraper.Candidate(
              source_name="Greater Manchester Police",
              source_url="https://example.test/story",
              source_title="Police issue appeal after collision in Rochdale town centre",
              source_summary="Police are appealing for witnesses after a collision in Rochdale town centre on Wednesday evening.",
              source_published_at="2026-07-09T18:00:00Z",
              area="rochdale",
              category="crime",
              source_body_excerpt="A man was taken to hospital after the collision. Officers asked anyone with dashcam footage to contact police.",
          )
          source = (
              candidate.source_title + " " + candidate.source_summary + " "
              + candidate.source_body_excerpt
          )
          good = {
              "publishable": True,
              "title": "Witness appeal follows Rochdale town-centre collision",
              "excerpt": "Police are seeking witnesses and dashcam footage after a collision in Rochdale town centre left a man requiring hospital treatment.",
              "paragraphs": [
                  "Police have appealed for witnesses following a collision in Rochdale town centre on Wednesday evening.",
                  "A man was taken to hospital, while officers asked drivers with relevant dashcam footage to contact them.",
              ],
          }
          assert not scraper.draft_quality_issues(good, source, candidate), scraper.draft_quality_issues(good, source, candidate)

          bad = dict(good)
          bad["paragraphs"] = [
              "The update was published by police and further confirmed information will be added."
          ]
          assert scraper.draft_quality_issues(bad, source, candidate)
          assert not scraper._contains_exact_source_phrase(
              "Police appealed for witnesses after the Rochdale collision.",
              source,
          )
          print("Rewrite validation tests passed.")
          PY

      - name: Run scraper with repaired rewriting
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAX_AI_ARTICLES_PER_RUN: "30"
          MAX_AI_ARTICLES_INITIAL: "30"
          AI_WORKERS: "4"
        run: |
          test -n "$OPENAI_API_KEY" || { echo "OPENAI_API_KEY is missing"; exit 1; }
          python scraper/scraper.py

      - name: Rebuild front page and article pages
        run: |
          python scraper/frontpage_pipeline.py
          python scraper/generate_pages.py

      - name: Check generated copy
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          banned = re.compile(
              r"the update was published by|has been categorised as|"
              r"further confirmed information will be added|"
              r"no coherent grounded rewrite could be produced",
              re.I,
          )
          offenders = [
              article.get("title", "Untitled")
              for article in articles
              if banned.search(
                  " ".join(
                      str(article.get(field) or "")
                      for field in ("title", "excerpt", "summary", "content_html")
                  )
              )
          ]
          if offenders:
              raise SystemExit("Generic or diagnostic copy remains: " + "; ".join(offenders[:10]))
          print(f"Checked {len(articles)} retained articles.")
          PY

      - name: Commit repaired scraper and regenerated site
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add scraper/scraper.py articles.json articles/frontpage.json scraper_status.json sitemap.xml articles assets/img/generated || true
          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi
          git commit -m "Relax rewrite rejection while preserving grounded reporting"
          git pull --rebase origin main
          git push origin HEAD:main
