name: Publish manual article edits

# Rebuilds the site whenever articles.json changes (e.g. edited in the GitHub
# web editor) so editorial updates go live without waiting for a scrape.
on:
  push:
    paths:
      - articles.json
  workflow_dispatch:

permissions:
  contents: write

# Shares the scraper's lock so a publish never races a scheduled run.
concurrency:
  group: rochdale-daily-15-minute-scraper
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The scraper's own feed commits also touch articles.json; skip those.
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
      - name: Rebuild pages and sitemap
        run: |
          python -m json.tool articles.json > /dev/null
          python scraper/article_gate.py articles.json
          python scraper/generate_pages.py
      - name: Commit rebuilt site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json scraper_status.json articles sitemap.xml
          if git diff --cached --quiet; then echo "Nothing to publish."; exit 0; fi
          git commit -m "Publish manual article edits"

          # A scheduled scrape can land while this publish is building.
          # articles.json is machine-generated whole-file state, so a plain
          # rebase can never resolve a conflict in it; merge origin instead
          # and resolve the feed with the pipeline's story-aware merger.
          # The editor's version is passed as the authoritative (remote)
          # side so a manual edit is never overwritten by the racing run.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); merging origin/${GITHUB_REF_NAME}."
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git merge --no-edit "origin/${GITHUB_REF_NAME}"; then
              if git ls-files -u -- articles.json | grep -q .; then
                git show ":2:articles.json" > /tmp/editorial_articles.json
                git show ":3:articles.json" > /tmp/scraper_articles.json
                python scraper/merge_feeds.py /tmp/editorial_articles.json /tmp/scraper_articles.json articles.json
                git add articles.json
              fi
              conflicted=$(git diff --name-only --diff-filter=U)
              if [ -n "${conflicted}" ]; then
                echo "${conflicted}" | while read -r file; do
                  git checkout --ours -- "${file}" 2>/dev/null || git rm -q -- "${file}"
                  git add -- "${file}" 2>/dev/null || true
                done
              fi
              git commit --no-edit
            fi
          done
          echo "Failed to push after 5 attempts."
          exit 1
