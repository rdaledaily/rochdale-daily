name: Rochdale Daily hourly scraper

on:
  workflow_dispatch:
  schedule:
    # Runs at 17 minutes past every hour (UTC).
    # Avoids GitHub Actions congestion at exactly :00.
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: rochdale-daily-hourly-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ROCHDALE_LAT: "53.6097"
      ROCHDALE_LON: "-2.1561"

    steps:
      - name: Show trigger details
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "UTC time: $(date -u)"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install playwright openai feedparser beautifulsoup4 requests lxml html5lib tldextract
          fi
          playwright install --with-deps chromium

      - name: Run Rochdale Daily scraper
        shell: bash
        run: |
          python scraper/scraper.py

      - name: Validate article feed
        shell: bash
        run: |
          test -f articles.json
          python -m json.tool articles.json > /dev/null

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add articles.json UPDATE_LOG.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No article changes to commit."
            exit 0
          fi

          git commit -m "Update Rochdale Daily articles"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
