name: Scrape Facebook and Update Articles

on:
  workflow_dispatch:        # allow manual trigger
  schedule:
    - cron: "0 * * * *"     # run every hour

permissions:
  contents: write           # allow pushing to repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright openai feedparser beautifulsoup4 requests
          playwright install chromium

      - name: Debug file structure (before scraper)
        run: |
          echo "📂 Files in root:"
          ls -la
          echo "📂 Files in scraper/:"
          ls -la scraper/ || echo "scraper directory not f
