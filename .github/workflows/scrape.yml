name: Scrape Facebook and Update Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # every hour

permissions:
  contents: write

# OPTIONAL: add a repo secret CF_PAGES_HOOK_URL for Cloudflare Pages deploy hook
env:
  CF_PAGES_HOOK_URL: ${{ secrets.CF_PAGES_HOOK_URL }}

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: python -m pip install --upgrade pip && pip install playwright openai feedparser beautifulsoup4 requests && playwright install chromium

      - name: Debug file structure before scraper
        shell: bash
        run: echo "Files in root:" && ls -la && echo "Files in scraper/:" && (ls -la scraper/ || echo "scraper directory not found")

      - name: Run scraper
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_A_
