name: Rochdale Daily 15-minute scraper

on:
  workflow_dispatch:
  schedule:
    # Hourly full run: includes the public Facebook Events browser collector.
    - cron: "7 * * * *"
    # Three fast news runs per hour: no Chromium or apt installation.
    - cron: "22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: rochdale-daily-15-minute-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      FACEBOOK_GRAPH_VERSION: "v22.0"
      FACEBOOK_EVENTS_DISCOVERY_URL: "https://www.facebook.com/events/?date_filter_option=ANY_DATE&discover_tab=CUSTOM&location_id=108023932551149"
      FACEBOOK_EVENTS_MAX: "18"
      FACEBOOK_EVENT_IMAGE_REUSE: "false"
      # Browser collection runs hourly and on manual runs. The other three
      # scheduled checks continue with all non-browser sources.
      FACEBOOK_EVENTS_BROWSER_ENABLED: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '7 * * * *' }}
      OPENAI_MODEL: "gpt-4o-mini"
      AI_REWRITE_REQUIRED: "true"
      MAX_NEWS_AGE_HOURS: "24"
      ARTICLE_RETENTION_DAYS: "1"
      MAX_PUBLISHED_ARTICLES: "180"
      MAX_AI_ARTICLES_PER_RUN: "50"
      MAX_AI_ARTICLES_INITIAL: "100"
      RESPECT_ROBOTS: "true"
      USE_SOURCE_IMAGES: "true"
      SAME_DAY_ONLY: "true"
      RIGHT_TO_REPLY_EMAIL: "news@rochdaledaily.co.uk"
      SOCIAL_CONTEXT_ENABLED: "true"
      FACEBOOK_COMMENTS_ENABLED: "true"
      SOCIAL_MIN_PUBLIC_REACTIONS: "3"
      SOCIAL_MAX_PUBLIC_REACTIONS: "12"
      SOCIAL_MAX_OFFICIAL_UPDATES: "4"
      X_RECENT_SEARCH_MAX: "100"
      DISCOVERY_LINKS_PER_SOURCE: "40"
      RSS_ITEMS_PER_SOURCE: "100"
      GOOGLE_SEARCH_QUERY_LIMIT: "128"
      DISCOVERY_PAGE_LIMIT: "3"
      DISCOVERY_WORKERS: "12"
      AI_WORKERS: "6"
      MIN_BALANCED_SELECTION_LIMIT: "40"
      MAX_SELECTED_PER_SOURCE: "4"
      MAX_SELECTED_PER_CATEGORY: "8"
      HTTP_POOL_CONNECTIONS: "64"
      HTTP_POOL_MAXSIZE: "64"
      MIN_LIVE_STORIES: "40"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

          # PIL is the Python import provided by the Pillow package.
          # Install it explicitly so an accidentally stale requirements file
          # cannot cause the scraper to fail at runtime.
          python -m pip install --no-cache-dir "Pillow>=10,<13"

      - name: Verify Python dependencies       - name: Verify API credentials
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          python - <<'PY'
          import os
          import sys
          import requests
          from openai import OpenAI

          def required_secret(name):
              value = os.getenv(name, "").strip()
              if not value:
                  print(f"::error::{name} is missing or empty")
                  sys.exit(1)

              # Show that it exists without revealing it.
              print(f"{name}: configured")
              return value

          def optional_secret(name):
              value = os.getenv(name, "").strip()
              if value:
                  print(f"{name}: configured")
              else:
                  print(f"::warning::{name} is not configured")
              return value

          # ---------------------------------------------------------
          # OpenAI: required because AI_REWRITE_REQUIRED is true.
          # This tests the exact model used by the scraper.
          # ---------------------------------------------------------
          openai_key = required_secret("OPENAI_API_KEY")

          try:
              client = OpenAI(api_key=openai_key)
              response = client.chat.completions.create(
                  model=os.getenv("OPENAI_MODEL", "gpt-4o-mini"),
                  messages=[
                      {
                          "role": "user",
                          "content": "Reply with exactly: OK",
                      }
                  ],
                  temperature=0,
                  max_tokens=3,
              )
              result = response.choices[0].message.content or ""
              print(f"OpenAI API: working — response was {result!r}")
          except Exception as exc:
              print(
                  f"::error::OpenAI API test failed: "
                  f"{type(exc).__name__}: {exc}"
              )
              sys.exit(1)

          # ---------------------------------------------------------
          # X: tests the same recent-search endpoint as the scraper.
          # ---------------------------------------------------------
          x_token = optional_secret("X_BEARER_TOKEN")

          if x_token:
              response = requests.get(
                  "https://api.x.com/2/tweets/search/recent",
                  headers={
                      "Authorization": f"Bearer {x_token}",
                  },
                  params={
                      "query": "Rochdale -is:retweet",
                      "max_results": 10,
                  },
                  timeout=30,
              )

              if response.status_code == 200:
                  print("X API: working")
              else:
                  try:
                      error = response.json()
                  except Exception:
                      error = response.text[:300]

                  print(
                      f"::error::X API failed with "
                      f"HTTP {response.status_code}: {error}"
                  )
                  sys.exit(1)

          # ---------------------------------------------------------
          # Facebook: test the actual pages configured in the scraper.
          # Some tokens may work for one page but not another.
          # ---------------------------------------------------------
          facebook_token = optional_secret(
              "FACEBOOK_PAGE_ACCESS_TOKEN"
          )

          if facebook_token:
              version = os.getenv(
                  "FACEBOOK_GRAPH_VERSION",
                  "v22.0",
              )

              pages = [
                  "GMPRochdale",
                  "rochvalleyradio",
                  "rochdalecouncil",
                  "beenetworkgm",
                  "rochdalesfc",
              ]

              successes = 0

              for page in pages:
                  response = requests.get(
                      (
                          f"https://graph.facebook.com/"
                          f"{version}/{page}/posts"
                      ),
                      params={
                          "access_token": facebook_token,
                          "fields": "id,message,created_time",
                          "limit": 1,
                      },
                      timeout=30,
                  )

                  if response.status_code == 200:
                      successes += 1
                      print(f"Facebook API — {page}: working")
                  else:
                      try:
                          error = response.json()
                      except Exception:
                          error = response.text[:300]

                      print(
                          f"::warning::Facebook API — {page} failed "
                          f"with HTTP {response.status_code}: {error}"
                      )

              if successes == 0:
                  print(
                      "::error::The Facebook token could not access "
                      "any configured page"
                  )
                  sys.exit(1)

          print("API credential verification completed.")
          PY
        run: |
          python - <<'PY'
          import bs4
          import dateparser
          import feedparser
          import lxml
          import openai
          import requests

          from PIL import Image, ImageOps, UnidentifiedImageError
          from playwright.sync_api import sync_playwright

          print("Dependency verification passed.")
          print("Pillow version:", Image.__version__)
          PY

      - name: Restore cached Chromium
        if: ${{ env.FACEBOOK_EVENTS_BROWSER_ENABLED == 'true' }}
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Chromium operating-system dependencies
        if: ${{ env.FACEBOOK_EVENTS_BROWSER_ENABLED == 'true' }}
        timeout-minutes: 10
        run: |
          python -m playwright install-deps chromium

      - name: Install Chromium browser
        if: ${{ env.FACEBOOK_EVENTS_BROWSER_ENABLED == 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
        timeout-minutes: 10
        run: |
          python -m playwright install chromium

      - name: Confirm Facebook Events browser mode
        run: |
          echo "FACEBOOK_EVENTS_BROWSER_ENABLED=${FACEBOOK_EVENTS_BROWSER_ENABLED}"

      - name: Validate locality, identity, coverage, search and rewrite policy
        run: |
          python -m py_compile scraper/locality_rules.py scraper/story_identity.py scraper/selection_policy.py scraper/search_queries.py scraper/rewrite_safety.py scraper/scraper.py
          python scraper/test_locality.py
          python scraper/test_story_identity.py
          python scraper/test_selection_policy.py
          python scraper/test_search_queries.py
          python scraper/test_rewrite_safety.py

      - name: Run Rochdale Daily pipeline
        run: |
          python scraper/scraper.py

      - name: Validate public article feed
        run: |
          python -m json.tool articles.json > /dev/null

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add articles.json scraper_status.json assets/img/generated

          if git diff --cached --quiet; then
            echo "No article changes to commit."
            exit 0
          fi

          git commit -m "Update Rochdale Daily news feed"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
