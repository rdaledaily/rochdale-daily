name: Scrape Facebook + Web + RSS, Rewrite, and Update Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # every hour

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install playwright openai feedparser beautifulsoup4 requests
          playwright install chromium

      - name: Run scraper (requires OPENAI_API_KEY and FB_COOKIE)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
          
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then echo "OPENAI_API_KEY is not set"; exit 1; fi
          if [ -z "${FB_COOKIE:-}" ]; then echo "FB_COOKIE is not set"; exit 1; fi

          # Your scraper does: scrape -> rewrite via OpenAI -> write articles.json
          python scraper/scraper.py

          # Ensure the file ends up at repo root
          if [ -f scraper/articles.json ]; then mv scraper/articles.json ./articles.json; fi
          if [ ! -f articles.json ]; then echo "articles.json not found after scraper"; exit 1; fi

      - name: Commit
