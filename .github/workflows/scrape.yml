name: Scrape + Web + RSS with Fallbacks (Always Rewrite)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # hourly UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (with retry for Playwright)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install playwright openai feedparser beautifulsoup4 requests lxml html5lib
          for i in {1..3}; do
            if playwright install chromium; then
              break
            else
              echo "Playwright install failed (attempt $i). Retrying..."
              sleep 10
            fi
          done

      - name: Hash articles.json before (if present)
        shell: bash
        run: |
          if [ -f articles.json ]; then
            sha256sum articles.json | awk '{print $1}' > .before_hash
          else
            echo NOFILE > .before_hash
          fi
          echo "BEFORE_HASH=$(cat .before_hash)"

      - name: Primary scraper (Facebook + RSS + Web baseline)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
          FB_USER_AGENT: ${{ secrets.FB_USER_AGENT }}
        run: |
          echo "Running primary scraper with baseline sources: Facebook + RSS + Web"

          # Require FB secrets for FB scraping; still let scraper proceed with RSS+Web if missing
          if [ -z "$FB_COOKIE" ] || [ -z "$FB_USER_AGENT" ]; then
            echo "WARNING: Facebook secrets missing - Facebook scraping disabled; baseline is RSS + Web only"
            export SKIP_FACEBOOK=1
          else
            echo "Facebook credentials present - FB + RSS + Web enabled"
          fi
          export FORCE_RSS_WEB=1

          # Run scraper with timeout; do not fail the job on error
          timeout 600 python scraper/scraper.py 2>&1 | tee scraper_output.log || {
            echo "Primary scraper failed or timed out (continuing to fallback if needed)."
          }

          # Normalize output location
          if [ -f scraper/articles.json ]; then
            mv scraper/articles.json ./articles.json
          fi

          # Facebook session status for logs
          FB_NOTICE=0
          if [ -z "$FB_COOKIE" ] || [ -z "$FB_USER_AGENT" ]; then
            echo "STATUS: Running with RSS + Web (Facebook unavailable)"
            FB_NOTICE=1
          elif [ ! -f scraper/session.json ]; then
            echo "WARNING: FB cookie set but no scraper/session.json - session may have expired"
            FB_NOTICE=1
          elif [ -f scraper/session.json ]; then
            AGE=$(( ( $(date +%s) - $(date -r scraper/session.json +%s) ) / 86400 ))
            if [ "$AGE" -gt 3 ]; then
              echo "WARNING: Facebook session.json is $AGE days old - may need refresh"
              FB_NOTICE=1
            else
              echo "STATUS: Facebook session present and recent"
            fi
          fi
          echo "$FB_NOTICE" > .fb_notice

          # Show logs if present
          if [ -f scraper/scraper.log ]; then
            echo "Last 50 lines of scraper/scraper.log:"; tail -n 50 scraper/scraper.log || true
          fi
          if [ -f scraper_output.log ]; then
            echo "Last 50 lines of scraper_output.log:"; tail -n 50 scraper_output.log || true
          fi

      - name: Fallback to RSS + Web if articles.json missing/invalid (and write helper scripts)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Determine if fallback is needed
          python <<'PY' > .need_fallback
import json, sys
try:
    with open('articles.json','r',encoding='utf-8') as f:
        data = json.load(f)
    ok = isinstance(data, list) and len(data) > 0
except Exception:
    ok = False
sys.stdout.write('0\n' if ok else '1\n')
PY
          echo "NEED_FALLBACK=$(cat .need_fallback)"

          # --- Write fallback.py (RSS + Web; attempts OpenAI rewrite) ---
          mkdir -p .tmp
          cat > .tmp/fallback.py <<'PY'
import os, re, json, datetime as dt, requests, feedparser
from bs4 import BeautifulSoup

def norm(s): return re.sub(r'\s+',' ', (s or '').strip())
def slugify(s): return re.sub(r'[^a-z0-9]+','-', (s or '').lower()).strip('-')[:60]
def category_for(text):
    t=(text or '').lower()
    C={"crime":["arrest","police","stabbing","theft","burglary","assault","violence","court","knife","gun","drugs","wanted","jailed"],
       "transport":["bus","tram","train","traffic","roadworks","closure","accident","transport","highway","m62","m60","bee network","parking","car park"],
       "politics":["council","mp","election","vote","government","parliament","politician","policy","minister","mayor"],
       "education":["school","college","university","teacher","student","exam","lesson","classroom","headteacher","ofsted","pupil"],
       "sport":["football","match","league","team","tournament","goal","player","cup","rugby","cricket"],
       "events":["festival","concert","match","tournament","fair","market","fundraiser","party","gala","celebration","open day","parade","show","act","live music","gig","performance","game","event"]}
    for k,v in C.items():
        if any(w in t for w in v): return k
    return "announcements"

def rss_items():
    RSS={"rochdale_council":"https://www.rochdale.gov.uk/news/rss.xml",
         "gmp_news":"https://www.gmp.police.uk/news/rss.xml",
         "bbc_manchester":"http://feeds.bbci.co.uk/news/england/manchester/rss.xml"}
    out=[]
    for key,url in RSS.items():
        try:
            feed=feedparser.parse(url)
            for i,e in enumerate(feed.entries[:8]):
                title=norm(getattr(e,"title","") or "Update")[:150]
                summary=norm(getattr(e,"summary","") or getattr(e,"description",""))
                link=getattr(e,"link","") or url
                if getattr(e,"published_parsed",None):
                    ts=dt.datetime(*e.published_parsed[:6], tzinfo=dt.timezone.utc)
                else:
                    ts=dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc)
                cat=category_for(f"{title}. {summary}")
                html="<p>"+("</p><p>".join([summary] if summary else ["Update"]))+"</p>"
                out.append({
                    "id": f"{dt.datetime.utcnow().strftime('%Y%m%d%H%M%S')}-rss-{key}-{i}",
                    "title": title,
                    "slug": slugify(title),
                    "excerpt": summary[:300],
                    "content_html": html,
                    "area": "rochdale",
                    "types": [cat],
                    "published_at": ts.isoformat().replace("+00:00","Z"),
                    "image_url": f"assets/img/placeholder_{cat}.jpg",
                    "source_url": link
                })
        except Exception as ex:
            print("RSS error", key, ex)
    return out

def web_items():
    pages=[("men_rochdale","https://www.manchestereveningnews.co.uk/all-about/rochdale"),
           ("bing_rochdale","https://www.bing.com/news/search?q=Rochdale&FORM=EWRE")]
    out=[]
    headers={"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
    for name,url in pages:
        try:
            r=requests.get(url, headers=headers, timeout=20)
            if not r.ok: 
                continue
            soup=BeautifulSoup(r.text,"html.parser")
            links=[]
            for a in soup.find_all("a"):
                href=a.get("href") or ""
                text=norm(a.get_text(" "))
                if "http" in href and len(text)>=24 and "javascript:" not in href:
                    links.append((text, href))
            for i,(text,href) in enumerate(links[:8]):
                cat=category_for(text)
                out.append({
                    "id": f"{dt.datetime.utcnow().strftime('%Y%m%d%H%M%S')}-web-{name}-{i}",
                    "title": text[:150],
                    "slug": slugify(text),
                    "excerpt": text[:300],
                    "content_html": "<p>"+text+"</p>",
                    "area": "rochdale",
                    "types": [cat],
                    "published_at": dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc).isoformat().replace("+00:00","Z"),
                    "image_url": f"assets/img/placeholder_{cat}.jpg",
                    "source_url": href
                })
        except Exception as ex:
            print("Web error", name, ex)
    return out

def rewrite_with_openai(items):
    if not items: 
        return items
    key=os.getenv("OPENAI_API_KEY")
    if not key:
        print("WARNING: OPENAI_API_KEY missing; cannot rewrite.")
        return items
    try:
        from openai import OpenAI
        client=OpenAI(api_key=key)
    except Exception as e:
        print("OpenAI init failed:", e)
        return items
    for it in items:
        try:
            prompt=("Rewrite this into a concise UK local news article for Rochdale.\n"
                    "- Neutral tone, UK spelling.\n- 150-220 words.\n"
                    "- Headline as first line.\n\n"
                    f"Title: {it['title']}\nSummary: {it['excerpt']}\nSource: {it['source_url']}")
            resp=client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[{"role":"system","content":"You are a UK local news journalist."},
                          {"role":"user","content":prompt}],
                max_tokens=900, temperature=0.4)
            out=resp.choices[0].message.content.strip()
            lines=[l for l in out.split("\n") if l.strip()]
            if lines:
                it["title"]=re.sub(r"^#+\s*","",lines[0])[:150]
                body=lines[1:] if len(lines)>1 else lines
                html="<p>"+"</p><p>".join([norm(l) for l in body])+"</p>" if body else "<p>Update</p>"
                it["content_html"]=html
                it["excerpt"]=norm(" ".join(body))[:300]
                it["slug"]=slugify(it["title"])
        except Exception as e:
            print("OpenAI rewrite failed:", e)
    return items

def main():
    print("EMERGENCY FALLBACK: Building from RSS + Web")
    items=rss_items()+web_items()
    items=rewrite_with_openai(items)
    with open("articles.json","w",encoding="utf-8") as f:
        json.dump(items, f, ensure_ascii=False, indent=2)
    print(f"Fallback wrote {len(items)} items to articles.json")

if __name__=="__main__":
    main()
PY

          # Run fallback ONLY if needed
          if [ "$(cat .need_fallback)" = "1" ]; then
            python .tmp/fallback.py || echo "Fallback builder encountered errors; continuing."
          else
            echo "No fallback required."
          fi

          # --- Write final_rewrite.py (ALWAYS run) ---
          cat > .tmp/final_rewrite.py <<'PY'
import os, json, re
def norm(s): import re as _re; return _re.sub(r'\s+',' ', (s or '').strip())
def slugify(s): return re.sub(r'[^a-z0-9]+','-', (s or '').lower()).strip('-')[:60]
try:
    data=json.load(open("articles.json","r",encoding="utf-8"))
    if not isinstance(data,list): data=[]
except Exception:
    data=[]
key=os.getenv("OPENAI_API_KEY")
if key and data:
    try:
        from openai import OpenAI
        client=OpenAI(api_key=key)
        for it in data:
            title=(it.get("title") or "Update")[:150]
            excerpt=norm(it.get("excerpt") or "")
            src=it.get("source_url","")
            prompt=("Rewrite this into a concise UK local news article for Rochdale.\n"
                    "- Neutral tone, UK spelling.\n- 150-220 words.\n"
                    "- Headline as first line.\n\n"
                    f"Title: {title}\nSummary: {excerpt}\nSource: {src}")
            try:
                resp=client.chat.completions.create(
                    model="gpt-4o-mini",
                    messages=[{"role":"system","content":"You are a UK local news journalist."},
                              {"role":"user","content":prompt}],
                    max_tokens=900, temperature=0.4)
                out=resp.choices[0].message.content.strip()
                lines=[l for l in out.split("\n") if l.strip()]
                if lines:
                    it["title"]=re.sub(r"^#+\s*","",lines[0])[:150]
                    body=lines[1:] if len(lines)>1 else lines
                    html="<p>"+"</p><p>".join([norm(l) for l in body])+"</p>" if body else "<p>Update</p>"
                    it["content_html"]=html
                    it["excerpt"]=norm(" ".join(body))[:300]
                    it["slug"]=slugify(it["title"])
            except Exception as e:
                print("OpenAI rewrite failed on an item:", e)
    except Exception as e:
        print("OpenAI init failed:", e)
else:
    if not key:
        print("WARNING: OPENAI_API_KEY missing; skipping final rewrite.")
with open("articles.json","w",encoding="utf-8") as f:
    json.dump(data, f, ensure_ascii=False, indent=2)
print("Final rewrite complete; items:", len(data))
PY

      - name: ALWAYS run final OpenAI rewrite pass
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ ! -f articles.json ]; then echo "[]" > articles.json; fi
          python .tmp/final_rewrite.py || echo "Final rewrite encountered errors; continuing."

      - name: Random backoff (reduce concurrent pushes)
        shell: bash
        run: |
          sleep $((RANDOM % 30))

      - name: Commit and push (articles or heartbeat, with retry)
        shell: bash
        run: |
          if [ -f articles.json ]; then
            AFTER=$(sha256sum articles.json | awk '{print $1}')
          else
            echo "[]" > articles.json
            AFTER=$(sha256sum articles.json | awk '{print $1}')
          fi
          BEFORE=$(cat .before_hash)

          if [ -f .fb_notice ] && [ "$(cat .fb_notice)" = "1" ]; then
            echo "INFO: Facebook unavailable/expired; fallbacks used."
          fi

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$BEFORE" != "$AFTER" ]; then
            git add articles.json
            MSG="Update articles.json - $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          else
            date -u +%s >> UPDATE_LOG.txt
            git add UPDATE_LOG.txt
            MSG="Heartbeat (no content change) - $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          fi

          git commit -m "$MSG" || true

          for i in {1..3}; do
            if git push; then
              echo "Push successful"
              break
            else
              echo "Push failed (attempt $i). Retrying..."
              git pull --rebase || true
              sleep 10
            fi
          done

          echo "Workflow complete."
