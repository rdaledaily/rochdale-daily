name: Scrape Facebook and Deploy

on:
  schedule:
    - cron: "0 */3 * * *"   # run every 3 hours
  workflow_dispatch:         # allow manual runs from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ✅ allow pushing commits back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright openai
          playwright install chromium

      - name: Add FB cookies from secret
        run: |
          echo '${{ secrets.FB_COOKIES }}' > scraper/fb_cookies.json

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scraper/scraper.py

      - name: Commit & push updated articles.json
        run: |
          git config user.name "RochdaleDailyBot"
          git config user.email "actions@github.com"
          git add articles.json
          git diff --quiet && echo "No changes to commit" || (git commit -m "Auto-update articles [skip ci]" && git push)
