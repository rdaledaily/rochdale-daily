name: Scrape Web RSS Facebook with Fallbacks (Always Rewrite)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # hourly UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright openai feedparser beautifulsoup4 requests lxml html5lib
          playwright install chromium

      - name: Hash articles.json before
        run: |
          if [ -f articles.json ]; then
            sha256sum articles.json | awk '{print $1}' > .before_hash
          else
            echo NOFILE > .before_hash
          fi
          echo "BEFORE_HASH=$(cat .before_hash)"

      - name: Primary scraper (best effort) + FB session notice
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
          FB_USER_AGENT: ${{ secrets.FB_USER_AGENT }}
        run: |
          echo "Running primary scraper..."
          python scraper/scraper.py || echo "Primary scraper exited non-zero (fallback may be used)."
          if [ -f scraper/articles.json ]; then mv scraper/articles.json ./articles.json; fi

          FB_NOTICE=0
          if [ ! -f scraper/session.json ] && [ -z "$FB_COOKIE" ]; then
            echo "NOTICE: No Facebook session.json and no FB_COOKIE secret."
            FB_NOTICE=1
          fi
          if [ -f scraper/session.json ]; then
            AGE=$(( ( $(date +%s) - $(date -r scraper/session.json +%s) ) / 86400 ))
            if [ "$AGE" -gt 3 ]; then
              echo "NOTICE: scraper/session.json is $AGE days old and may be expired."
              FB_NOTICE=1
            fi
          fi
          echo "$FB_NOTICE" > .fb_notice || true

          if [ -f scraper/scraper.log ]; then
            echo "Tail of scraper/scraper.log:"
            tail -n 50 scraper/scraper.log || true
          fi

      - name: Prepare fallback builder (RSS + Web, with OpenAI rewrite)
        run: |
          mkdir -p .tmp
          cat > .tmp/fallback.py << 'PY'
import os, re, json, datetime as dt, time, requests, feedparser
from bs4 import BeautifulSoup

def norm(s): return re.sub(r'\s+',' ', (s or '').strip())
def slugify(s): return re.sub(r'[^a-z0-9]+','-', (s or '').lower()).strip('-')[:60]
def category_for(text):
    t=(text or '').lower()
    C={"crime":["arrest","police","stabbing","theft","burglary","assault","violence","court","knife","gun","drugs","wanted","jailed"],
       "transport":["bus","tram","train","traffic","roadworks","closure","accident","transport","highway","m62","m60","bee network","parking","car park"],
       "politics":["council","mp","election","vote","government","parliament","politician","policy","minister","mayor"],
       "education":["school","college","university","teacher","student","exam","lesson","classroom","headteacher","ofsted","pupil"],
       "sport":["football","match","league","team","tournament","goal","player","cup","rugby","cricket"],
       "events":["festival","concert","match","tournament","fair","market","fundraiser","party","gala","celebration","open day","parade","show","act","live music","gig","performance","game","event"]}
    for k,v in C.items():
        if any(w in t for w in v): return k
    return "announcements"

def valid_nonempty_articles_json():
    try:
        with open("articles.json","r",encoding="utf-8") as f:
            data=json.load(f)
        return isinstance(data,list) and len(data)>0
    except Exception:
        return False

def rss_items():
    RSS={"rochdale_council":"https://www.rochdale.gov.uk/news/rss.xml",
         "gmp_news":"https://www.gmp.police.uk/news/rss.xml",
         "bbc_manchester":"http://feeds.bbci.co.uk/news/england/manchester/rss.xml"}
    out=[]
    for key,url in RSS.items():
        try:
            feed=feedparser.parse(url)
            for i,e in enumerate(feed.entries[:8]):
                title=norm(getattr(e,"title","") or "Update")[:150]
                summary=norm(getattr(e,"summary","") or getattr(e,"description",""))
                link=getattr(e,"link","") or url
                if getattr(e,"published_parsed",None):
                    ts=dt.datetime(*e.published_parsed[:6], tzinfo=dt.timezone.utc)
                else:
                    ts=dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc)
                cat=category_for(f"{title}. {summary}")
                html="<p>"+("</p><p>".join([summary] if summary else ["Update"]))+"</p>"
                out.append({
                    "id": f"{dt.datetime.utcnow().strftime('%Y%m%d%H%M%S')}-rss-{key}-{i}",
                    "title": title,
                    "slug": slugify(title),
                    "excerpt": summary[:200],
                    "content_html": html,
                    "area": "rochdale",
                    "types": [cat],
                    "published_at": ts.isoformat().replace("+00:00","Z"),
                    "image_url": f"assets/img/placeholder_{cat}.jpg",
                    "source_url": link
                })
        except Exception as ex:
            print("RSS error", key, ex)
    return out

def web_items():
    pages=[("men_rochdale","https://www.manchestereveningnews.co.uk/all-about/rochdale"),
           ("bing_rochdale","https://www.bing.com/news/search?q=Rochdale&FORM=EWRE")]
    out=[]
    headers={"User-Agent":"Mozilla/5.0"}
    for name,url in pages:
        try:
            r=requests.get(url, headers=headers, timeout=20)
            if not r.ok: continue
            soup=BeautifulSoup(r.text,"html.parser")
            links=[]
            for a in soup.find_all("a"):
                href=a.get("href") or ""
                text=norm(a.get_text(" "))
                if "http" in href and len(text)>=24 and "javascript:" not in href:
                    links.append((text, href))
            for i,(text,href) in enumerate(links[:8]):
                cat=category_for(text)
                out.append({
                    "id": f"{dt.datetime.utcnow().strftime('%Y%m%d%H%M%S')}-web-{name}-{i}",
                    "title": text[:150],
                    "slug": slugify(text),
                    "excerpt": text[:200],
                    "content_html": "<p>"+text+"</p>",
                    "area": "rochdale",
                    "types": [cat],
                    "published_at": dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc).isoformat().replace("+00:00","Z"),
                    "image_url": f"assets/img/placeholder_{cat}.jpg",
                    "source_url": href
                })
        except Exception as ex:
            print("Web error", name, ex)
    return out

def always_rewrite_with_openai(items):
    if not items:
        return items
    key=os.getenv("OPENAI_API_KEY")
    if not key:
        print("WARNING: OPENAI_API_KEY missing; cannot rewrite. Continuing with original text.")
        return items
    try:
        from openai import OpenAI
        client=OpenAI(api_key=key)
    except Exception as e:
        print("OpenAI init failed", e)
        return items
    for it in items:
        try:
            prompt=("Rewrite this into a concise UK local news article for Rochdale.\n"
                    "- Neutral tone, UK spelling.\n- 150-220 words.\n"
                    "- Headline as first line.\n\n"
                    f"Title: {it['title']}\nSummary: {it['excerpt']}\nSource: {it['source_url']}")
            resp=client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[{"role":"system","content":"You are a UK local news journalist."},
                          {"role":"user","content":prompt}],
                max_tokens=700, temperature=0.4)
            out=resp.choices[0].message.content.strip()
            lines=[l for l in out.split("\n") if l.strip()]
            if lines:
                it["title"]=re.sub(r"^#+\s*","",lines[0])[:150]
                body=lines[1:] if len(lines)>1 else lines
                html="<p>"+"</p><p>".join([norm(l) for l in body])+"</p>" if body else "<p>Update</p>"
                it["content_html"]=html
                it["excerpt"]=norm(" ".join(body))[:200]
                it["slug"]=slugify(it["title"])
        except Exception as e:
            print("OpenAI rewrite failed", e)
    return items

def main():
    need_fallback = True
    if os.path.exists("articles.json"):
        try:
            with open("articles.json","r",encoding="utf-8") as f:
                data=json.load(f)
            if isinstance(data, list) and len(data)>0:
                need_fallback = False
                items = data
            else:
                items = []
        except Exception:
            items = []
    else:
        items = []

    if need_fallback:
        print("Primary output missing/invalid/empty. Building from RSS + Web.")
        items = rss_items() + web_items()

    # ALWAYS attempt to rewrite with OpenAI (logs if key missing)
    items = always_rewrite_with_openai(items)

    with open("articles.json","w",encoding="utf-8") as f:
        json.dump(items, f, ensure_ascii=False, indent=2)
    print(f"Wrote {len(items)} items to articles.json")
if __name__ == "__main__":
    main()
PY

      - name: Run fallback builder (always safe)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python .tmp/fallback.py || echo "Fallback builder encountered a non-fatal error; continuing."

      - name: Commit and push (articles or heartbeat)
        run: |
          if [ -f articles.json ]; then
            AFTER=$(sha256sum articles.json | awk '{print $1}')
          else
            echo "[]" > articles.json
            AFTER=$(sha256sum articles.json | awk '{print $1}')
          fi
          BEFORE=$(cat .before_hash)

          if [ -f .fb_notice ] && [ "$(cat .fb_notice)" = "1" ]; then
            echo "NOTICE: Facebook session likely expired or failed. Fallback sources used."
          fi

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$BEFORE" != "$AFTER" ]; then
            git add articles.json
            MSG="Update articles.json - $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          else
            date -u +%s >> UPDATE_LOG.txt
            git add UPDATE_LOG.txt
            MSG="Heartbeat (no content change) - $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          fi

          git commit -m "$MSG" || true
          git pull --rebase || true
          git push || true

          echo "Done."
