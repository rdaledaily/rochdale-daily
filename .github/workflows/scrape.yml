            response = client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[
                    {"role": "system", "content": "You write clear, neutral UK local news for Rochdale with a patriotic, community-first tone. Comply with UK media law."},
                    {"role": "user", "content": prompt}
