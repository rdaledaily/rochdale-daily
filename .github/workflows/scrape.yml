name: Scrape Facebook and Update Articles

on:
  workflow_dispatch:     # manual trigger
  schedule:
    - cron: "0 * * * *"  # run every hour

permissions:
  contents: write   # allow pushing to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          pip install playwright openai
          playwright install chromium
          
      - name: Debug environment
        run: |
          echo "Files in root:"
          ls -la
          echo "Files in scraper/:"
          ls -la scraper/ || echo "scraper directory not found"
          echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY:-0}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run scraper
        run: |
          echo "🚀 Running scraper..."
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ OPENAI_API_KEY is not set!"
            exit 1
          fi
          python scraper/scraper.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: false

      - name: Commit & push updated articles.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -f articles.json ]]; then
            git add articles.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update articles.json - $(date '+%Y-%m-%d %H:%M UTC')"
              git push
              echo "✅ Articles updated and pushed"
            fi
          else
            echo "⚠️ articles.json not found"
          fi
