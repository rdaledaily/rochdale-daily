name: Rochdale Daily 15-minute scraper

on:
  workflow_dispatch:
  schedule:
    # Hourly full run: includes the public Facebook Events browser collector.
    - cron: "7 * * * *"
    # Three fast news runs per hour: no Chromium or apt installation.
    - cron: "22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: rochdale-daily-15-minute-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      FACEBOOK_GRAPH_VERSION: "v22.0"
      FACEBOOK_EVENTS_DISCOVERY_URL: "https://www.facebook.com/events/?date_filter_option=ANY_DATE&discover_tab=CUSTOM&location_id=108023932551149"
      FACEBOOK_EVENTS_MAX: "18"
      FACEBOOK_EVENT_IMAGE_REUSE: "false"
      FACEBOOK_EVENTS_BROWSER_ENABLED: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '7 * * * *' }}

      OPENAI_MODEL: "gpt-4o-mini"

      # Rewrites remain preferred, but a failed/declined rewrite now falls back
      # to an attributed article instead of silently discarding the candidate.
      AI_REWRITE_REQUIRED: "false"

      # Police appeals, court updates and ongoing traffic matters often remain
      # relevant beyond midnight.
      MAX_NEWS_AGE_HOURS: "168"
      ARTICLE_RETENTION_DAYS: "14"
      SAME_DAY_ONLY: "false"

      FRONTPAGE_PRIMARY_DAYS: "1"
      FRONTPAGE_FALLBACK_DAYS: "3"
      FRONTPAGE_MIN_ARTICLES: "50"
      FRONTPAGE_TARGET_ARTICLES: "80"

      MAX_PUBLISHED_ARTICLES: "180"

      MAX_PUBLISHED_ARTICLES: "180"
      MAX_AI_ARTICLES_PER_RUN: "50"
      MAX_AI_ARTICLES_INITIAL: "100"
      RESPECT_ROBOTS: "true"
      REQUEST_TIMEOUT: "20"
      USE_SOURCE_IMAGES: "true"
      RIGHT_TO_REPLY_EMAIL: "news@rochdaledaily.co.uk"

      SOCIAL_CONTEXT_ENABLED: "true"
      FACEBOOK_COMMENTS_ENABLED: "true"
      SOCIAL_MIN_PUBLIC_REACTIONS: "3"
      SOCIAL_MAX_PUBLIC_REACTIONS: "12"
      SOCIAL_MAX_OFFICIAL_UPDATES: "4"
      X_RECENT_SEARCH_MAX: "100"

      DISCOVERY_LINKS_PER_SOURCE: "40"
      RSS_ITEMS_PER_SOURCE: "100"
      GOOGLE_SEARCH_QUERY_LIMIT: "128"
      DISCOVERY_PAGE_LIMIT: "3"
      DISCOVERY_WORKERS: "12"
      AI_WORKERS: "6"
      MIN_BALANCED_SELECTION_LIMIT: "40"
      MAX_SELECTED_PER_SOURCE: "12"
      MAX_SELECTED_PER_CATEGORY: "20"
      HTTP_POOL_CONNECTIONS: "64"
      HTTP_POOL_MAXSIZE: "64"
      MIN_LIVE_STORIES: "40"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir "Pillow>=10,<13"

      - name: Verify Python dependencies
        run: |
          python - <<'PY'
          import bs4
          import dateparser
          import feedparser
          import lxml
          import openai
          import requests

          from PIL import Image, ImageOps, UnidentifiedImageError
          from playwright.sync_api import sync_playwright

          print("Dependency verification passed.")
          print("Pillow version:", Image.__version__)
          PY

      - name: Restore cached Chromium
        if: ${{ env.FACEBOOK_EVENTS_BROWSER_ENABLED == 'true' }}
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Chromium operating-system dependencies
        if: ${{ env.FACEBOOK_EVENTS_BROWSER_ENABLED == 'true' }}
        timeout-minutes: 10
        run: |
          python -m playwright install-deps chromium

      - name: Install Chromium browser
        if: ${{ env.FACEBOOK_EVENTS_BROWSER_ENABLED == 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
        timeout-minutes: 10
        run: |
          python -m playwright install chromium

      - name: Confirm Facebook Events browser mode
        run: |
          echo "FACEBOOK_EVENTS_BROWSER_ENABLED=${FACEBOOK_EVENTS_BROWSER_ENABLED}"

      - name: Validate pipeline
        run: |
          python -m py_compile scraper/locality_rules.py scraper/story_identity.py scraper/selection_policy.py scraper/search_queries.py scraper/rewrite_safety.py scraper/house_style.py scraper/editorial_upgrade.py scraper/source_presentation.py scraper/generate_pages.py scraper/food_hygiene.py scraper/frontpage_pipeline.py scraper/merge_feeds.py scraper/scraper.py
          python scraper/test_locality.py
          python scraper/test_story_identity.py
          python scraper/test_selection_policy.py
          python scraper/test_search_queries.py
          python scraper/test_rewrite_safety.py
          python scraper/test_editorial_length.py
          python scraper/test_food_hygiene.py
          python scraper/test_archive_persistence.py
          python scraper/test_event_identity.py
          (
            cd scraper
            python -c "import scraper; print('Scraper startup import passed.')"
          )

      - name: Repair contaminated event records
        run: |
          # Idempotent: drops any event record fused from multiple event
          # URLs (re-collected cleanly from the ticket feed this same run)
          # and corrects miscategorised events. A no-op on clean data.
          python scraper/repair_event_records.py

      - name: Run Rochdale Daily pipeline
        run: |
          python scraper/scraper.py

      - name: Validate public article feed
        run: |
          python -m json.tool articles.json > /dev/null

      - name: Generate static article pages and sitemap
        run: |
          python scraper/generate_pages.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add articles.json scraper_status.json assets/img/generated articles sitemap.xml

          if git diff --cached --quiet; then
            echo "No article changes to commit."
            exit 0
          fi

          git commit -m "Update Rochdale Daily news feed"

          # origin/main can move while a run is in progress (an editorial
          # publish, a manual push, or the hourly run overlapping a fast
          # run). articles.json is machine-generated whole-file state, so a
          # plain rebase can never resolve a conflict in it. Instead: merge
          # origin/main, resolve articles.json with the pipeline's own
          # story-identity merge (lossless union, locked edits preserved,
          # published slugs stable), take this run's version of the other
          # generated files, and retry the push a few times.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); merging origin/${GITHUB_REF_NAME}."
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git merge --no-edit "origin/${GITHUB_REF_NAME}"; then
              # articles.json: story-aware merge of both sides.
              if git ls-files -u -- articles.json | grep -q .; then
                git show ":3:articles.json" > /tmp/remote_articles.json
                git show ":2:articles.json" > /tmp/local_articles.json
                python scraper/merge_feeds.py /tmp/remote_articles.json /tmp/local_articles.json articles.json
                git add articles.json
              fi
              # Every other conflicted file is generated output; this run's
              # copy is the freshest and is regenerated in 15 minutes anyway.
              # Article pages only ever gain files now, so add/add conflicts
              # on the same slug are identical stories: keep ours.
              conflicted=$(git diff --name-only --diff-filter=U)
              if [ -n "${conflicted}" ]; then
                echo "${conflicted}" | while read -r file; do
                  git checkout --ours -- "${file}" 2>/dev/null || git rm -q -- "${file}"
                  git add -- "${file}" 2>/dev/null || true
                done
              fi
              git commit --no-edit
            fi
          done
          echo "Failed to push after 5 attempts."
          exit 1
