log.info(f"Processing {len(data)} articles with AI rewrite...")

for it in data:
    try:
        # Special handling for council meetings
        if it.get('needs_ai_summary'):
            log.info(f"Council summary: {it['title']}")
            
            prompt = f"""Convert this council meeting into a plain English summary for Rochdale residents.

Meeting: {it['title']}
Source: {it.get('source_url', '')}

Create a brief, accessible summary that:
- Explains what the meeting is about in simple terms
- Lists key topics/agenda items if available
- Notes when and where it takes place
- Explains how residents can participate or view documents
- Uses plain English, avoiding jargon

Keep it under 150 words."""

            response = client.chat.completions.create(
                model='gpt-4o-mini',
                messages=[
                    {'role': 'system', 'content': 'You make council information accessible to everyday residents.'},
                    {'role': 'user', 'content': prompt}
                ],
                max_tokens=300,
                temperature=0.3
            )
            
            summary = response.choices[0].message.content.strip()
            it['excerpt'] = summary[:250]
            it['content_html'] = f'<p>{summary}</p>'
            
            # Remove flag
            del it['needs_ai_summary']
            
        # Enhanced legal review for crime/court stories
        elif it.get('legal_sensitive'):
            log.warning(f"Legal sensitive rewrite: {it['title']}")
            
            title = it.get('title') or 'Update'
            body_text = BeautifulSoup(it.get('content_html', ''), 'lxml').get_text("\n")
            sources = it.get('source_urls') or [it.get('source_url', '')]
            domains = ', '.join(sorted({re.sub(r'^www\.', '', re.sub(r'^https?://', '', u)).split('/')[0] for u in sources if u}))
            category = it.get('types', ['announcements'])[0] if it.get('types') else 'announcements'

            prompt = f"""{EDITORIAL}

⚠️ LEGAL SENSITIVITY WARNING: This story involves crime, courts, or sensitive allegations.
MANDATORY COMPLIANCE with UK media law is CRITICAL.

SOURCE TITLE: {title}
SOURCE SUMMARY: {norm(it.get('excerpt', ''))}
SOURCE BODY (raw): {body_text[:2000]}
CATEGORY: {category}

CRITICAL LEGAL REQUIREMENTS FOR THIS STORY:
1. Use "allegedly", "reportedly", "claims", "according to [source]" - NEVER state allegations as fact
2. Include right to reply - "[Name/Organisation] was contacted for comment"
3. If charges filed: "[Name], [age], of [area], has been charged with [offence]"
