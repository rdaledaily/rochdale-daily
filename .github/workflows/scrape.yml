name: Scrape Facebook and Deploy

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  workflow_dispatch:       # lets you run manually from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright openai
          playwright install chromium

      - name: Add FB cookies from secret
        run: |
          echo '${{ secrets.FB_COOKIES }}' > scraper/fb_cookies.json

      - name: Test OpenAI Key
  env:
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  run: python scraper/test_openai.py


      - name: Commit & push updated articles.json
        run: |
          git config user.name "RochdaleDailyBot"
          git config user.email "actions@github.com"
          git add articles.json
          git commit -m "Auto-update articles [skip ci]" || echo "No changes"
          git push
