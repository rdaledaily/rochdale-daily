name: Scrape + Rewrite + Update articles.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # hourly

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright openai feedparser beautifulsoup4 requests
          playwright install chromium

      - name: Debug listing (optional)
        run: |
          echo "Files in root:" && ls -la || true
          echo "Files in scraper/:" && ls -la scraper || echo "scraper directory not found"

      - name: Run scraper (needs OPENAI_API_KEY and FB_COOKIE)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
          FB_USER_AGENT: ${{ secrets.FB_USER_AGENT }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}]()
