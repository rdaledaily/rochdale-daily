name: Rochdale Daily hourly scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: rochdale-daily-hourly-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: "gpt-4o-mini"
      MAX_NEWS_AGE_HOURS: "168"
      ARTICLE_RETENTION_DAYS: "14"
      MAX_AI_ARTICLES_PER_RUN: "20"
      RESPECT_ROBOTS: "true"
      IMAGE_REUSE_SOURCE_DOMAINS: "rochdale.gov.uk,gmp.police.uk,manchesterfire.gov.uk,rochdaleafc.co.uk,tfgm.com"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Rochdale Daily scraper
        run: |
          python scraper/scraper.py

      - name: Validate JSON feeds
        run: |
          python -m json.tool articles.json > /dev/null
          python -m json.tool review_queue.json > /dev/null

      - name: Commit feed changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add articles.json review_queue.json

          if git diff --cached --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi

          git commit -m "Update Rochdale Daily news feed"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
