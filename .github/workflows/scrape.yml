name: Scrape Facebook and Deploy

on:
  workflow_dispatch:   # run manually
  schedule:
    - cron: "0 * * * *"   # run every hour

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright openai
          playwright install chromium

      - name: Run scraper
        run: |
          set +e   # <-- don’t exit if scraper fails
          echo "🚀 Running scraper..."
          python scraper/scraper.py || echo "⚠️ Scraper failed — continuing without new articles"
          set -e

      - name: Preview articles.json
        run: head -n 40 articles.json || echo "⚠️ No articles.json file found"

      - name: Commit & push updated articles.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add articles.json || true
          git commit -m "Update articles.json [skip ci]" || echo "⚠️ Nothing to commit"
          git push || echo "⚠️ Push skipped"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: rochdale-daily
          directory: .
