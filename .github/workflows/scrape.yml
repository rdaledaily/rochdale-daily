## What it means for Rochdale
- 2–4 bullets on local impact, safety, services

---
⚠️ LEGAL COMPLIANCE CHECKLIST:
- [ ] "Allegedly" or attribution used for all claims
- [ ] Right to reply included
- [ ] Victim/minor anonymity protected
- [ ] Court reporting restrictions noted if applicable
- [ ] No prejudicial language or guilt assumptions

Sources: {domains}

Right to Reply: [Names contacted for comment]
"""

            response = client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[
                    {"role": "system", "content": "You are a UK news legal sub-editor. STRICT compliance with UK media law is mandatory. Use legally defensive language."},
                    {"role": "user", "content": prompt}
                ],
                temperature=0.3,  # Lower temperature for legal content
                max_tokens=900
            )
            
            content = response.choices[0].message.content.strip()
            lines = [l for l in content.split("\n") if l.strip()]
            
            if lines:
                it['title'] = re.sub(r'^#+\s*', '', lines[0])[:150]
                body_lines = lines[1:] if len(lines) > 1 else []
                it['content_html'] = '<p>' + '</p><p>'.join([norm(x) for x in body_lines]) + '</p>' if body_lines else '<p>Update</p>'
                it['excerpt'] = norm(BeautifulSoup(it['content_html'], 'lxml').get_text())[:300]
                it['slug'] = slugify(it['title'])
                
                tags = set(it.get('types', []) or [])
                tags.update(['patriotic', 'local-news', 'legal-reviewed'])
                it['types'] = sorted(tags)
            
            # Remove sensitive flag after processing
            del it['legal_sensitive']
            
        # Standard rewrite for other articles
        else:
            title = it.get('title') or 'Update'
            body_text = BeautifulSoup(it.get('content_html', ''), 'lxml').get_text("\n")
            sources = it.get('source_urls') or [it.get('source_url', '')]
