name: Scrape + Web + RSS with Fallbacks (Always Rewrite)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # hourly UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (with retry for Playwright)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install playwright openai feedparser beautifulsoup4 requests lxml html5lib
          for i in {1..3}; do
            if playwright install chromium; then
              break
            else
              echo "Playwright install failed (attempt $i). Retrying..."
              sleep 10
            fi
          done

      - name: Hash articles.json before (if present)
        shell: bash
        run: |
          if [ -f articles.json ]; then
            sha256sum articles.json | awk '{print $1}' > .before_hash
          else
            echo NOFILE > .before_hash
          fi
          echo "BEFORE_HASH=$(cat .before_hash)"

      - name: Primary scraper (Facebook + RSS + Web baseline)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
          FB_USER_AGENT: ${{ secrets.FB_USER_AGENT }}
        run: |
          echo "Running primary scraper with baseline sources: Facebook + RSS + Web"

          # Facebook availability (still allow scraper to run on RSS+Web)
          if [ -z "$FB_COOKIE" ] || [ -z "$FB_USER_AGENT" ]; then
            echo "WARNING: Facebook secrets missing - Facebook scraping disabled (RSS+Web only)"
            export SKIP_FACEBOOK=1
          else
            echo "Facebook credentials present - FB + RSS + Web enabled"
          fi
          export FORCE_RSS_WEB=1

          # Run scraper with timeout; do not fail the job
          timeout 600 python scraper/scraper.py 2>&1 | tee scraper_output.log || {
            echo "Primary scraper failed or timed out (continuing to fallback if needed)."
          }

          # Normalize output location
          if [ -f scraper/articles.json ]; then
            mv scraper/articles.json ./articles.json
          fi

          # Facebook session status for logs
          FB_NOTICE=0
          if [ -z "$FB_COOKIE" ] || [ -z "$FB_USER_AGENT" ]; then
            echo "STATUS: Running with RSS + Web (Facebook unavailable)"
            FB_NOTICE=1
          elif [ ! -f scraper/session.json ]; then
            echo "WARNING: FB cookie set but no scraper/session.json - session may have expired"
            FB_NOTICE=1
          else
            AGE=$(( ( $(date +%s) - $(date -r scraper/session.json +%s) ) / 86400 ))
            if [ "$AGE" -gt 3 ]; then
              echo "WARNING: Facebook session.json is $AGE days old - may need refresh"
              FB_NOTICE=1
            else
              echo "STATUS: Facebook session present and recent"
            fi
          fi
          echo "$FB_NOTICE" > .fb_notice

          # Show logs if present
          if [ -f scraper/scraper.log ]; then
            echo "Last 50 lines of scraper/scraper.log:"; tail -n 50 scraper/scraper.log || true
          fi
          if [ -f scraper_output.log ]; then
            echo "Last 50 lines of scraper_output.log:"; tail -n 50 scraper_output.log || true
          fi

      - name: Fallback + Final Rewrite (write helper scripts and run) — NO bare Python in YAML
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          mkdir -p .tmp

          # ---- check_json.py (via printf) ----
          : > .tmp/check_json.py
          printf "%s\n" "import json, sys" >> .tmp/check_json.py
          printf "%s\n" "try:" >> .tmp/check_json.py
          printf "%s\n" "    with open('articles.json','r',encoding='utf-8') as f:" >> .tmp/check_json.py
          printf "%s\n" "        data = json.load(f)" >> .tmp/check_json.py
          printf "%s\n" "    ok = isinstance(data, list) and len(data) > 0" >> .tmp/check_json.py
          printf "%s\n" "except Exception:" >> .tmp/check_json.py
          printf "%s\n" "    ok = False" >> .tmp/check_json.py
          printf "%s\n" "sys.stdout.write('0\\n' if ok else '1\\n')" >> .tmp/check_json.py

          python .tmp/check_json.py > .need_fallback
          echo "NEED_FALLBACK=$(cat .need_fallback)"

          # ---- fallback.py (RSS + Web; attempts OpenAI rewrite) via printf ----
          : > .tmp/fallback.py
          printf "%s\n" "import os, re, json, datetime as dt, requests, feedparser" >> .tmp/fallback.py
          printf "%s\n" "from bs4 import BeautifulSoup" >> .tmp/fallback.py
          printf "%s\n" "def norm(s): return re.sub(r'\s+',' ', (s or '').strip())" >> .tmp/fallback.py
          printf "%s\n" "def slugify(s): return re.sub(r'[^a-z0-9]+','-', (s or '').lower()).strip('-')[:60]" >> .tmp/fallback.py
          printf "%s\n" "def category_for(text):" >> .tmp/fallback.py
          printf "%s\n" "    t=(text or '').lower()" >> .tmp/fallback.py
          printf "%s\n" "    C={'crime':['arrest','police','stabbing','theft','burglary','assault','violence','court','knife','gun','drugs','wanted','jailed']," >> .tmp/fallback.py
          printf "%s\n" "       'transport':['bus','tram','train','traffic','roadworks','closure','accident','transport','highway','m62','m60','bee network','parking','car park']," >> .tmp/fallback.py
          printf "%s\n" "       'politics':['council','mp','election','vote','government','parliament','politician','policy','minister','mayor']," >> .tmp/fallback.py
          printf "%s\n" "       'education':['school','college','university','teacher','student','exam','lesson','classroom','headteacher','ofsted','pupil']," >> .tmp/fallback.py
          printf "%s\n" "       'sport':['football','match','league','team','tournament','goal','player','cup','rugby','cricket']," >> .tmp/fallback.py
          printf "%s\n" "       'events':['festival','concert','match','tournament','fair','market','fundraiser','party','gala','celebration','open day','parade','show','act','live music','gig','performance','game','event']}" >> .tmp/fallback.py
          printf "%s\n" "    for k,v in C.items():" >> .tmp/fallback.py
          printf "%s\n" "        if any(w in t for w in v): return k" >> .tmp/fallback.py
          printf "%s\n" "    return 'announcements'" >> .tmp/fallback.py
          printf "%s\n" "" >> .tmp/fallback.py
          printf "%s\n" "def rss_items():" >> .tmp/fallback.py
          printf "%s\n" "    RSS={'rochdale_council':'https://www.rochdale.gov.uk/news/rss.xml'," >> .tmp/fallback.py
          printf "%s\n" "         'gmp_news':'https://www.gmp.police.uk/news/rss.xml'," >> .tmp/fallback.py
          printf "%s\n" "         'bbc_manchester':'http://feeds.bbci.co.uk/news/england/manchester/rss.xml'}" >> .tmp/fallback.py
          printf "%s\n" "    out=[]" >> .tmp/fallback.py
          printf "%s\n" "    for key,url in RSS.items():" >> .tmp/fallback.py
          printf "%s\n" "        try:" >> .tmp/fallback.py
          printf "%s\n" "            feed=feedparser.parse(url)" >> .tmp/fallback.py
          printf "%s\n" "            for i,e in enumerate(feed.entries[:8]):" >> .tmp/fallback.py
          printf "%s\n" "                title=norm(getattr(e,'title','') or 'Update')[:150]" >> .tmp/fallback.py
          printf "%s\n" "                summary=norm(getattr(e,'summary','') or getattr(e,'description',''))" >> .tmp/fallback.py
          printf "%s\n" "                link=getattr(e,'link','') or url" >> .tmp/fallback.py
          printf "%s\n" "                if getattr(e,'published_parsed',None):" >> .tmp/fallback.py
          printf "%s\n" "                    ts=dt.datetime(*e.published_parsed[:6], tzinfo=dt.timezone.utc)" >> .tmp/fallback.py
          printf "%s\n" "                else:" >> .tmp/fallback.py
          printf "%s\n" "                    ts=dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc)" >> .tmp/fallback.py
          printf "%s\n" "                cat=category_for(f'{title}. {summary}')" >> .tmp/fallback.py
          printf "%s\n" "                html='<p>'+('</p><p>'.join([summary] if summary else ['Update']))+'</p>'" >> .tmp/fallback.py
          printf "%s\n" "                out.append({" >> .tmp/fallback.py
          printf "%s\n" "                    'id': f\"{dt.datetime.utcnow().strftime('%Y%m%d%H%M%S')}-rss-{key}-{i}\"," >> .tmp/fallback.py
          printf "%s\n" "                    'title': title," >> .tmp/fallback.py
          printf "%s\n" "                    'slug': slugify(title)," >> .tmp/fallback.py
          printf "%s\n" "                    'excerpt': summary[:300]," >> .tmp/fallback.py
          printf "%s\n" "                    'content_html': html," >> .tmp/fallback.py
          printf "%s\n" "                    'area': 'rochdale'," >> .tmp/fallback.py
          printf "%s\n" "                    'types': [cat]," >> .tmp/fallback.py
          printf "%s\n" "                    'published_at': ts.isoformat().replace('+00:00','Z')," >> .tmp/fallback.py
          printf "%s\n" "                    'image_url': f'assets/img/placeholder_{cat}.jpg'," >> .tmp/fallback.py
          printf "%s\n" "                    'source_url': link" >> .tmp/fallback.py
          printf "%s\n" "                })" >> .tmp/fallback.py
          printf "%s\n" "        except Exception as ex:" >> .tmp/fallback.py
          printf "%s\n" "            print('RSS error', key, ex)" >> .tmp/fallback.py
          printf "%s\n" "    return out" >> .tmp/fallback.py
          printf "%s\n" "" >> .tmp/fallback.py
          printf "%s\n" "def web_items():" >> .tmp/fallback.py
          printf "%s\n" "    pages=[('men_rochdale','https://www.manchestereveningnews.co.uk/all-about/rochdale')," >> .tmp/fallback.py
          printf "%s\n" "           ('bing_rochdale','https://www.bing.com/news/search?q=Rochdale&FORM=EWRE')]" >> .tmp/fallback.py
          printf "%s\n" "    out=[]" >> .tmp/fallback.py
          printf "%s\n" "    headers={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}" >> .tmp/fallback.py
          printf "%s\n" "    for name,url in pages:" >> .tmp/fallback.py
          printf "%s\n" "        try:" >> .tmp/fallback.py
          printf "%s\n" "            r=requests.get(url, headers=headers, timeout=20)" >> .tmp/fallback.py
          printf "%s\n" "            if not r.ok:" >> .tmp/fallback.py
          printf "%s\n" "                continue" >> .tmp/fallback.py
          printf "%s\n" "            soup=BeautifulSoup(r.text,'html.parser')" >> .tmp/fallback.py
          printf "%s\n" "            links=[]" >> .tmp/fallback.py
          printf "%s\n" "            for a in soup.find_all('a'):" >> .tmp/fallback.py
          printf "%s\n" "                href=a.get('href') or ''" >> .tmp/fallback.py
          printf "%s\n" "                text=norm(a.get_text(' '))" >> .tmp/fallback.py
          printf "%s\n" "                if 'http' in href and len(text)>=24 and 'javascript:' not in href:" >> .tmp/fallback.py
          printf "%s\n" "                    links.append((text, href))" >> .tmp/fallback.py
          printf "%s\n" "            for i,(text,href) in enumerate(links[:8]):" >> .tmp/fallback.py
          printf "%s\n" "                cat=category_for(text)" >> .tmp/fallback.py
          printf "%s\n" "                out.append({" >> .tmp/fallback.py
          printf "%s\n" "                    'id': f\"{dt.datetime.utcnow().strftime('%Y%m%d%H%M%S')}-web-{name}-{i}\"," >> .tmp/fallback.py
          printf "%s\n" "                    'title': text[:150]," >> .tmp/fallback.py
          printf "%s\n" "                    'slug': slugify(text)," >> .tmp/fallback.py
          printf "%s\n" "                    'excerpt': text[:300]," >> .tmp/fallback.py
          printf "%s\n" "                    'content_html': '<p>'+text+'</p>'," >> .tmp/fallback.py
          printf "%s\n" "                    'area': 'rochdale'," >> .tmp/fallback.py
          printf "%s\n" "                    'types': [cat]," >> .tmp/fallback.py
          printf "%s\n" "                    'published_at': dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc).isoformat().replace('+00:00','Z')," >> .tmp/fallback.py
          printf "%s\n" "                    'image_url': f'assets/img/placeholder_{cat}.jpg'," >> .tmp/fallback.py
          printf "%s\n" "                    'source_url': href" >> .tmp/fallback.py
          printf "%s\n" "                })" >> .tmp/fallback.py
          printf "%s\n" "        except Exception as ex:" >> .tmp/fallback.py
          printf "%s\n" "            print('Web error', name, ex)" >> .tmp/fallback.py
          printf "%s\n" "    return out" >> .tmp/fallback.py
          printf "%s\n" "" >> .tmp/fallback.py
          printf "%s\n" "def rewrite_with_openai(items):" >> .tmp/fallback.py
          printf "%s\n" "    if not items:" >> .tmp/fallback.py
          printf "%s\n" "        return items" >> .tmp/fallback.py
          printf "%s\n" "    key=os.getenv('OPENAI_API_KEY')" >> .tmp/fallback.py
          printf "%s\n" "    if not key:" >> .tmp/fallback.py
          printf "%s\n" "        print('WARNING: OPENAI_API_KEY missing; cannot rewrite.')" >> .tmp/fallback.py
          printf "%s\n" "        return items" >> .tmp/fallback.py
          printf "%s\n" "    try:" >> .tmp/fallback.py
          printf "%s\n" "        from openai import OpenAI" >> .tmp/fallback.py
          printf "%s\n" "        client=OpenAI(api_key=key)" >> .tmp/fallback.py
          printf "%s\n" "    except Exception as e:" >> .tmp/fallback.py
          printf "%s\n" "        print('OpenAI init failed:', e)" >> .tmp/fallback.py
          printf "%s\n" "        return items" >> .tmp/fallback.py
          printf "%s\n" "    for it in items:" >> .tmp/fallback.py
          printf "%s\n" "        try:" >> .tmp/fallback.py
          printf "%s\n" "            t=it.get('title','')" >> .tmp/fallback.py
          printf "%s\n" "            ex=it.get('excerpt','')" >> .tmp/fallback.py
          printf "%s\n" "            src=it.get('source_url','')" >> .tmp/fallback.py
          printf "%s\n" "            prompt=('Rewrite this into a concise UK local news article for Rochdale.\\n'" >> .tmp/fallback.py
          printf "%s\n" "                    '- Neutral tone, UK spelling.\\n- 150-220 words.\\n'" >> .tmp/fallback.py
          printf "%s\n" "                    '- Headline as first line.\\n\\n'" >> .tmp/fallback.py
          printf "%s\n" "                    'Title: {}\\nSummary: {}\\nSource: {}'.format(t, ex, src))" >> .tmp/fallback.py
          printf "%s\n" "            resp=client.chat.completions.create(" >> .tmp/fallback.py
          printf "%s\n" "                model='gpt-4o-mini'," >> .tmp/fallback.py
          printf "%s\n" "                messages=[{'role':'system','content':'You are a UK local news journalist.'}," >> .tmp/fallback.py
          printf "%s\n" "                          {'role':'user','content':prompt}]," >> .tmp/fallback.py
          printf "%s\n" "                max_tokens=900, temperature=0.4)" >> .tmp/fallback.py
          printf "%s\n" "            out=resp.choices[0].message.content.strip()" >> .tmp/fallback.py
          printf "%s\n" "            lines=[l for l in out.split('\\n') if l.strip()]" >> .tmp/fallback.py
          printf "%s\n" "            if lines:" >> .tmp/fallback.py
          printf "%s\n" "                it['title']=re.sub(r'^#+\\s*','',lines[0])[:150]" >> .tmp/fallback.py
          printf "%s\n" "                body=lines[1:] if len(lines)>1 else lines" >> .tmp/fallback.py
          printf "%s\n" "                html='<p>'+'</p><p>'.join([norm(l) for l in body])+'</p>' if body else '<p>Update</p>'" >> .tmp/fallback.py
          printf "%s\n" "                it['content_html']=html" >> .tmp/fallback.py
          printf "%s\n" "                it['excerpt']=norm(' '.join(body))[:300]" >> .tmp/fallback.py
          printf "%s\n" "                it['slug']=slugify(it['title'])" >> .tmp/fallback.py
          printf "%s\n" "        except Exception as e:" >> .tmp/fallback.py
          printf "%s\n" "            print('OpenAI rewrite failed:', e)" >> .tmp/fallback.py
          printf "%s\n" "    return items" >> .tmp/fallback.py
          printf "%s\n" "" >> .tmp/fallback.py
          printf "%s\n" "items=rss_items()+web_items()" >> .tmp/fallback.py
          printf "%s\n" "items=rewrite_with_openai(items)" >> .tmp/fallback.py
          printf "%s\n" "json.dump(items, open('articles.json','w',encoding='utf-8'), ensure_ascii=False, indent=2)" >> .tmp/fallback.py
          printf "%s\n" "print('Fallback wrote {} items to articles.json'.format(len(items)))" >> .tmp/fallback.py

          # Run fallback ONLY if needed
          if [ "$(cat .need_fallback)" = "1" ]; then
            python .tmp/fallback.py || echo "Fallback builder encountered errors; continuing."
          else
            echo "No fallback required."
          fi

          # ---- final_rewrite.py (ALWAYS run) via printf ----
          : > .tmp/final_rewrite.py
          printf "%s\n" "import os, json, re" >> .tmp/final_rewrite.py
          printf "%s\n" "def norm(s): import re as _re; return _re.sub(r'\s+',' ', (s or '').strip())" >> .tmp/final_rewrite.py
          printf "%s\n" "def slugify(s): return re.sub(r'[^a-z0-9]+','-', (s or '').lower()).strip('-')[:60]" >> .tmp/final_rewrite.py
          printf "%s\n" "try:" >> .tmp/final_rewrite.py
          printf "%s\n" "    data=json.load(open('articles.json','r',encoding='utf-8'))" >> .tmp/final_rewrite.py
          printf "%s\n" "    if not isinstance(data,list): data=[]" >> .tmp/final_rewrite.py
          printf "%s\n" "except Exception:" >> .tmp/final_rewrite.py
          printf "%s\n" "    data=[]" >> .tmp/final_rewrite.py
          printf "%s\n" "key=os.getenv('OPENAI_API_KEY')" >> .tmp/final_rewrite.py
          printf "%s\n" "if key and data:" >> .tmp/final_rewrite.py
          printf "%s\n" "    try:" >> .tmp/final_rewrite.py
          printf "%s\n" "        from openai import OpenAI" >> .tmp/final_rewrite.py
          printf "%s\n" "        client=OpenAI(api_key=key)" >> .tmp/final_rewrite.py
          printf "%s\n" "        for it in data:" >> .tmp/final_rewrite.py
          printf "%s\n" "            title=(it.get('title') or 'Update')[:150]" >> .tmp/final_rewrite.py
          printf "%s\n" "            excerpt=norm(it.get('excerpt') or '')" >> .tmp/final_rewrite.py
          printf "%s\n" "            src=it.get('source_url','')" >> .tmp/final_rewrite.py
          printf "%s\n" "            prompt=('Rewrite this into a concise UK local news article for Rochdale.\\n'" >> .tmp/final_rewrite.py
          printf "%s\n" "                    '- Neutral tone, UK spelling.\\n- 150-220 words.\\n'" >> .tmp/final_rewrite.py
          printf "%s\n" "                    '- Headline as first line.\\n\\n'" >> .tmp/final_rewrite.py
          printf "%s\n" "                    'Title: {}\\nSummary: {}\\nSource: {}'.format(title, excerpt, src))" >> .tmp/final_rewrite.py
          printf "%s\n" "            try:" >> .tmp/final_rewrite.py
          printf "%s\n" "                resp=client.chat.completions.create(" >> .tmp/final_rewrite.py
          printf "%s\n" "                    model='gpt-4o-mini'," >> .tmp/final_rewrite.py
          printf "%s\n" "                    messages=[{'role':'system','content':'You are a UK local news journalist.'}," >> .tmp/final_rewrite.py
          printf "%s\n" "                              {'role':'user','content':prompt}]," >> .tmp/final_rewrite.py
          printf "%s\n" "                    max_tokens=900, temperature=0.4)" >> .tmp/final_rewrite.py
          printf "%s\n" "                out=resp.choices[0].message.content.strip()" >> .tmp/final_rewrite.py
          printf "%s\n" "                lines=[l for l in out.split('\\n') if l.strip()]" >> .tmp/final_rewrite.py
          printf "%s\n" "                if lines:" >> .tmp/final_rewrite.py
          printf "%s\n" "                    it['title']=re.sub(r'^#+\\s*','',lines[0])[:150]" >> .tmp/final_rewrite.py
          printf "%s\n" "                    body=lines[1:] if len(lines)>1 else lines" >> .tmp/final_rewrite.py
          printf "%s\n" "                    html='<p>'+'</p><p>'.join([norm(l) for l in body])+'</p>' if body else '<p>Update</p>'" >> .tmp/final_rewrite.py
          printf "%s\n" "                    it['content_html']=html" >> .tmp/final_rewrite.py
          printf "%s\n" "                    it['excerpt']=norm(' '.join(body))[:300]" >> .tmp/final_rewrite.py
          printf "%s\n" "                    it['slug']=slugify(it['title'])" >> .tmp/final_rewrite.py
          printf "%s\n" "            except Exception as e:" >> .tmp/final_rewrite.py
          printf "%s\n" "                print('OpenAI rewrite failed on an item:', e)" >> .tmp/final_rewrite.py
          printf "%s\n" "    except Exception as e:" >> .tmp/final_rewrite.py
          printf "%s\n" "        print('OpenAI init failed:', e)" >> .tmp/final_rewrite.py
          printf "%s\n" "else:" >> .tmp/final_rewrite.py
          printf "%s\n" "    if not key:" >> .tmp/final_rewrite.py
          printf "%s\n" "        print('WARNING: OPENAI_API_KEY missing; skipping final rewrite.')" >> .tmp/final_rewrite.py
          printf "%s\n" "json.dump(data, open('articles.json','w',encoding='utf-8'), ensure_ascii=False, indent=2)" >> .tmp/final_rewrite.py
          printf "%s\n" "print('Final rewrite complete; items:', len(data))" >> .tmp/final_rewrite.py

          if [ ! -f articles.json ]; then echo "[]" > articles.json; fi
          python .tmp/final_rewrite.py || echo "Final rewrite encountered errors; continuing."

      - name: Random backoff (reduce concurrent pushes)
        shell: bash
        run: |
          sleep $((RANDOM % 30))

      - name: Commit and push (articles or heartbeat, with retry)
        shell: bash
        run: |
          if [ -f articles.json ]; then
            AFTER=$(sha256sum articles.json | awk '{print $1}')
          else
            echo "[]" > articles.json
            AFTER=$(sha256sum articles.json | awk '{print $1}')
          fi
          BEFORE=$(cat .before_hash)

          if [ -f .fb_notice ] && [ "$(cat .fb_notice)" = "1" ]; then
            echo "INFO: Facebook unavailable/expired; fallbacks used."
          fi

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$BEFORE" != "$AFTER" ]; then
            git add articles.json
            MSG="Update articles.json - $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          else
            date -u +%s >> UPDATE_LOG.txt
            git add UPDATE_LOG.txt
            MSG="Heartbeat (no content change) - $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          fi

          git commit -m "$MSG" || true

          for i in {1..3}; do
            if git push; then
              echo "Push successful"
              break
            else
              echo "Push failed (attempt $i). Retrying..."
              git pull --rebase || true
              sleep 10
            fi
          done

          echo "Workflow complete."
