import os, re, json, logging
from bs4 import BeautifulSoup

logging.basicConfig(level=logging.INFO)
log = logging.getLogger(__name__)

def norm(s):
    return re.sub(r'\s+', ' ', (s or '').strip())

def slugify(s):
    return re.sub(r'[^a-z0-9]+', '-', (s or '').lower()).strip('-')[:60]

try:
    data = json.load(open('articles.json', 'r', encoding='utf-8'))
    if not isinstance(data, list):
        data = []
except Exception:
    data = []

api_key = os.getenv('OPENAI_API_KEY')
if not api_key or not data:
    log.warning("No API key or no data; saving as-is.")
    with open('articles.json', 'w', encoding='utf-8') as f:
        json.dump(data, f, ensure_ascii=False, indent=2)
    import sys
    sys.exit(0)

from openai import OpenAI
client = OpenAI(api_key=api_key)

EDITORIAL = """
ROLE: You are a UK local news sub-editor for Rochdale Daily, bound by UK media law and journalistic standards.

==========================
UK LEGAL FRAMEWORKS
==========================
1) Defamation Act 2013:
- Use "allegedly", "reportedly", "claims" and source attribution for unproven allegations.
- Do not state accusations as fact before conviction.
- Attribute claims to named sources where possible.
- Use "a man/woman" or "a person" for unidentified individuals. Do not speculate on identity.
- For convictions, use: "[Name] was convicted at [Court] on [date] of [offence]".

2) Contempt of Court Act 1981 (Sub judice):
- Do not publish anything likely to prejudice active proceedings.
- Once charged: no speculation on guilt or prejudicial detail.
- Permitted during active cases: basic facts only (name, age, charge, court date).
- Flag reporting restrictions when they apply.

3) IPSO Editors' Code:
- Clause 1 Accuracy: correct inaccuracies promptly; distinguish comment from fact; headlines must not mislead.
- Privacy (Clause 2), Harassment (Clause 3), Children protections: follow Code principles.
- Right to reply is a house policy: offer fair opportunity to respond before publication where practicable.

4) Data Protection Act 2018 & UK GDPR:
- Publish only necessary personal data in the public interest.
- Do not publish full addresses, phone numbers, or personal emails.
- Protect victims' identities where required; use pseudonyms where appropriate.

5) Online Safety Act 2023:
- No illegal or harmful content.
- Duty of care: design and moderation consider user safety.

6) Sexual Offences (Amendment) Act 1992:
- Lifetime anonymity for sexual offence victims.

7) Children & Young Persons Act 1933:
- Automatic anonymity for under-18s involved in court proceedings.

8) Rehabilitation of Offenders Act 1974:
- Protect spent convictions. Check rehabilitation periods.

9) Ofcom Broadcasting Code / Coroners and Justice Act 2009:
- Apply where relevant (AV content; inquests and reporting).

==========================
EDITORIAL STYLE
==========================
- UK spelling. Short paragraphs (2-3 sentences). Clear subheads. Bullet lists for facts.
- Target 200-320 words unless a brief is more appropriate.
- Include a "What it means for Rochdale" section where relevant.
- Avoid activist framing or national partisan framing. Do not editorialise.
- Always fact-check against multiple sources where possible.

Required disclaimers and phrases for crime/court:
- "These allegations have not been proven in court."
- "[Name] denies the charges and will stand trial."
- "The victim, who cannot be named for legal reasons..."
- "A youth, who cannot be named for legal reasons..."
"""

log.info(f"Processing {len(data)} articles with AI rewrite...")

for it in data:
    try:
        if it.get('needs_ai_summary'):
            log.info(f"Council summary: {it['title']}")
            prompt = f"""Convert this council meeting into a plain English summary for Rochdale residents.

Meeting: {it['title']}
Source: {it.get('source_url', '')}

Create a brief, accessible summary that:
- Explains what the meeting is about in simple terms
- Lists key topics or agenda items if available
- Notes when and where it takes place
