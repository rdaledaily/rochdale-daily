name: Scrape Facebook and Update Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install playwright openai feedparser beautifulsoup4 requests
          playwright install chromium

      - name: Debug file structure (before scraper)
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' 'Files in
