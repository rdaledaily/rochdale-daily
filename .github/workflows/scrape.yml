                temperature=0.4,
                max_tokens=900
            )
            
            content = response.choices[0].message.content.strip()
            lines = [l for l in content.split("\n") if l.strip()]
            
            if lines:
                # Extract headline
                it['title'] = re.sub(r'^#+\s*', '', lines[0])[:150]
                
                # Extract body
                body_lines = lines[1:] if len(lines) > 1 else []
                it['content_html'] = '<p>' + '</p><p>'.join([norm(x) for x in body_lines]) + '</p>' if body_lines else '<p>Update</p>'
                it['excerpt'] = norm(BeautifulSoup(it['content_html'], 'lxml').get_text())[:300]
