name: Repair 15-minute scraper query volume

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-rochdale-query-volume
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

