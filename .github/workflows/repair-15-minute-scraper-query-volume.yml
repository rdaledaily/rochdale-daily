      - name: Compile repaired files
        run: |
          python -m py_compile             scraper/search_queries.py             scraper/test_search_queries.py             scraper/scraper.py

      - name: Run query regression tests
        run: |
          python scraper/test_search_queries.py

      - name: Verify four-run coverage and hard ceiling
        run: |
          python - <<'PY'
          import sys
          from datetime import datetime, timezone

          sys.path.insert(0, "scraper")
          from search_queries import (
              GOOGLE_SEARCH_SAFE_LIMIT,
              LOCATION_QUERIES_PER_HOUR,
              build_search_query_specs,
              rotating_location_queries,
          )

          fixed_runs = (
              datetime(2026, 7, 8, 16, 7, tzinfo=timezone.utc),
              datetime(2026, 7, 8, 16, 22, tzinfo=timezone.utc),
              datetime(2026, 7, 8, 16, 37, tzinfo=timezone.utc),
              datetime(2026, 7, 8, 16, 52, tzinfo=timezone.utc),
          )

          counts = [
              len(build_search_query_specs(200, now=run_time))
              for run_time in fixed_runs
          ]

          assert GOOGLE_SEARCH_SAFE_LIMIT == 68
          assert LOCATION_QUERIES_PER_HOUR == 40
          assert all(count <= GOOGLE_SEARCH_SAFE_LIMIT for count in counts), counts
          assert all(count < 70 for count in counts), counts
          assert len(rotating_location_queries(fixed_runs[0])) <= 40

          print("Safe per-run query counts:", counts)
          print("Generated location searches rotated per hour:", LOCATION_QUERIES_PER_HOUR)
          PY

      - name: Run complete pipeline validation suite
        run: |
          python scraper/test_locality.py
          python scraper/test_story_identity.py
          python scraper/test_selection_policy.py
          python scraper/test_search_queries.py
          python scraper/test_rewrite_safety.py

      - name: Commit query-volume repair
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"

          git add scraper/search_queries.py .github/workflows/scrape.yml

          if git diff --cached --quiet; then
            echo "The query-volume repair is already installed."
            exit 0
          fi

          git commit -m "Keep scheduled Google News searches below safe limit"
          git pull --rebase origin main
          git push origin HEAD:main
