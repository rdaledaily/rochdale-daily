name: Fetch photos (places and areas)

# Builds the curated photo library in assets/img/places/ from Wikimedia Commons.
#
# Manual only. Defaults to a dry run, which fetches nothing and simply prints
# what it would take, with the photographer and licence for each, so the whole
# set can be reviewed in the log before anything lands in the repository.
#
# Run it once with the default settings, read the log, then run it again with
# "download" set to true.

on:
  workflow_dispatch:
    inputs:
      download:
        description: "Actually download and commit (leave false for a dry run)"
        type: boolean
        default: false
      areas:
        description: "Fetch AREA photos instead of place photos (the universal card fallback)"
        type: boolean
        default: false
      only:
        description: "Optional filter, e.g. heywood — leave blank for all"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: rd-place-photos
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: python -m pip install --no-cache-dir "Pillow>=10,<13"

      - name: Fetch place photos
        run: |
          python scraper/fetch_place_photos.py \
            ${{ inputs.areas && '--areas' || '' }} \
            ${{ inputs.download && '--download' || '' }} \
            ${{ inputs.only != '' && format('--only {0}', inputs.only) || '' }}

      - name: Show what changed
        run: |
          git status --short assets/img || true

      - name: Commit new photos
        if: ${{ inputs.download }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/img

          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi

          git commit -m "Add photographs from Wikimedia Commons"
          git push origin "HEAD:${GITHUB_REF_NAME}"
