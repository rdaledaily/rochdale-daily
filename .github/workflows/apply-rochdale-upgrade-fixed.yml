        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path
          payload = base64.b64decode("".join(os.environ["ROCHDALE_UPGRADE_B64"].split()))
          Path("/tmp/install_rochdale_upgrade.py").write_bytes(payload)
          PY
          python /tmp/install_rochdale_upgrade.py

      - name: Validate installed upgrade
        run: |
          python -m py_compile scraper/frontpage_pipeline.py scraper/test_frontpage_pipeline.py scraper/generate_pages.py scraper/scraper.py
          python scraper/test_frontpage_pipeline.py

      - name: Build initial balanced front page
        env:
          EVENT_TICKET_SOURCE_URL: "https://www.whatsoccurrinevents.co.uk/ticket-box-office"
          FRONTPAGE_MIN_ARTICLES: "30"
          FRONTPAGE_TARGET_ARTICLES: "36"
          FRONTPAGE_PRIMARY_DAYS: "7"
          FRONTPAGE_FALLBACK_DAYS: "14"
        run: |
          python scraper/generate_pages.py
          python -m json.tool articles.json > /dev/null
          python -m json.tool articles/frontpage.json > /dev/null
          python - <<'PY'
          import json
          data = json.load(open("articles/frontpage.json", encoding="utf-8"))
          stories = data.get("articles", [])
          assert len(stories) >= 30, f"Front page contains only {len(stories)} stories"
          assert len({str(item.get("id") or item.get("story_key")) for item in stories}) == len(stories)
          assert all("online" not in (str(item.get("title", "")) + str(item.get("event_location", ""))).lower() for item in data.get("events", []))
          PY

      - name: Commit the upgrade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json articles/frontpage.json scraper_status.json assets/css/site.css assets/img/generated articles sitemap.xml index.html scraper/frontpage_pipeline.py scraper/test_frontpage_pipeline.py scraper/generate_pages.py scraper/scraper.py story_blocklist.json
          if git diff --cached --quiet; then
            echo "No upgrade changes to commit."
            exit 0
          fi
          git commit -m "Upgrade front page, ongoing stories and local events"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
