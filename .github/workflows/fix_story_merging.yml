name: Fix story merging and clean feed

# Run this ONCE (manually) after committing the updated
# scraper/story_identity.py, scraper/test_story_identity.py and
# scraper/repair_cross_story_merges.py. It verifies the matcher against the
# full regression suite, purges the existing contaminated article(s) from
# articles.json, regenerates the static pages, and commits the cleaned site.
# All matcher logic lives in the repo as reviewed code; this workflow never
# writes or injects Python.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rochdale-story-merge-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Run full story identity regression suite
        run: |
          python scraper/test_story_identity.py

      - name: Remove existing cross-story contamination from the feed
        run: |
          python scraper/repair_cross_story_merges.py

      - name: Re-cluster the cleaned feed with the fixed matcher
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, "scraper")
          from story_identity import dedupe_article_records

          path = Path("articles.json")
          articles = json.loads(path.read_text(encoding="utf-8"))
          before = len(articles)
          articles = dedupe_article_records(
              [item for item in articles if isinstance(item, dict)]
          )
          path.write_text(
              json.dumps(articles, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"Re-clustered feed: {before} -> {len(articles)} articles.")
          PY

      - name: Regenerate article pages and front page
        run: |
          python scraper/generate_pages.py

      - name: Validate cleaned public feed
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          offenders = []

          for article in articles:
              title = str(article.get("title") or "").lower()
              excerpt = str(article.get("excerpt") or article.get("summary") or "").lower()
              body = str(article.get("content_html") or "").lower()
              combined = " ".join([title, excerpt, body])

              has_deportation = (
                  "grooming" in combined
                  and ("deport" in combined or "pakistan" in combined)
              )
              has_farm_fire = (
                  "farm" in combined
                  and ("fire" in combined or "blaze" in combined)
                  and ("murder" in combined or "died" in combined or "dead" in combined)
              )
              if has_deportation and has_farm_fire:
                  offenders.append(article.get("title") or "Untitled")

          if offenders:
              raise SystemExit(
                  "Cross-story contamination remains: " + "; ".join(offenders[:10])
              )

          print(f"Validated {len(articles)} clean articles.")
          PY

      - name: Commit cleaned site
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"

          git add \
            articles.json \
            articles \
            sitemap.xml \
            assets/img/generated 2>/dev/null || true
          git add articles.json

          if git diff --cached --quiet; then
            echo "Feed was already clean; nothing to commit."
            exit 0
          fi

          git commit -m "Fix story clustering: complete-linkage dedupe and contamination cleanup"
          git pull --rebase origin main
          git push origin HEAD:main
