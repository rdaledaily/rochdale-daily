          Path('/tmp/install_rewrite_fix.py').write_bytes(base64.b64decode(os.environ['REWRITE_FIX_B64']))
          PYFIX
          python /tmp/install_rewrite_fix.py

      - name: Validate repaired code
        run: |
          python -m py_compile scraper/scraper.py scraper/frontpage_pipeline.py scraper/generate_pages.py
          (
            cd scraper
            python test_rewrite_quality.py
            python test_locality.py
            python test_story_identity.py
            python test_selection_policy.py
            python test_rewrite_safety.py
          )

      - name: Require OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured in repository secrets."
            exit 1
          fi

      - name: Rebuild articles with grounded rewriting
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          MAX_NEWS_AGE_HOURS: "168"
          ARTICLE_RETENTION_DAYS: "14"
          MAX_PUBLISHED_ARTICLES: "180"
          MAX_AI_ARTICLES_PER_RUN: "60"
          MAX_AI_ARTICLES_INITIAL: "100"
          MIN_LIVE_STORIES: "40"
          MIN_BALANCED_SELECTION_LIMIT: "40"
          MAX_SELECTED_PER_SOURCE: "12"
          MAX_SELECTED_PER_CATEGORY: "20"
          REQUEST_TIMEOUT: "20"
          USE_SOURCE_IMAGES: "true"
          RIGHT_TO_REPLY_EMAIL: "news@rochdaledaily.co.uk"
          FACEBOOK_EVENTS_BROWSER_ENABLED: "false"
          EVENT_TICKET_SOURCE_URL: "https://www.whatsoccurrinevents.co.uk/ticket-box-office"
          FRONTPAGE_MIN_ARTICLES: "30"
          FRONTPAGE_TARGET_ARTICLES: "36"
        run: |
          python scraper/scraper.py
          python scraper/frontpage_pipeline.py
          python scraper/generate_pages.py

      - name: Validate rebuilt publication
        run: |
          python -m json.tool articles.json > /dev/null
          python -m json.tool articles/frontpage.json > /dev/null
          python - <<'PYCHECK'
          import json, re
          from pathlib import Path

          bad_re = re.compile(
              r"has published (?:a|an) (?:crime|police|court|public[- ]safety|news) update|"
              r"the update was published by|the source item is titled|has been categorised as|"
              r"further confirmed information will be added|will update this report if the identified source|"
              r"the article remains open to correction|this automated brief does not add|"
              r"readers can use the source link",
              re.I,
          )
          articles = json.loads(Path('articles.json').read_text(encoding='utf-8'))
          bad = []
          for article in articles:
              text = ' '.join(str(article.get(k) or '') for k in ('title','excerpt','summary','content_html'))
              if article.get('publication_route') == 'direct-crime-autopublish' or bad_re.search(text):
                  bad.append(article.get('title'))
          if bad:
              raise SystemExit('Generic template articles remain: ' + ' | '.join(str(x) for x in bad[:10]))
          frontpage = json.loads(Path('articles/frontpage.json').read_text(encoding='utf-8'))
          count = len(frontpage.get('articles', []))
          if count < 30:
              raise SystemExit(f'Front page has only {count} articles; expected at least 30.')
          print(f'Validated {len(articles)} coherent retained articles and {count} front-page stories.')
          PYCHECK

      - name: Commit repaired articles and code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scraper/scraper.py scraper/frontpage_pipeline.py scraper/test_rewrite_quality.py             articles.json articles/frontpage.json scraper_status.json articles sitemap.xml assets/img/generated

          if git diff --cached --quiet; then
            echo "No rewriting changes to commit."
            exit 0
          fi

          git commit -m "Fix article rewriting and remove generic fallback copy"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
