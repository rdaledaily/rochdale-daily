      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir "Pillow>=10,<13"

      - name: Validate long-form and source-disclosure logic
        shell: bash
        run: |
          python -m py_compile \
            scraper/scraper.py \
            scraper/longform_enrichment.py \
            scraper/frontpage_pipeline.py \
            scraper/generate_pages.py \
            scraper/source_presentation.py

          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")
          import scraper
          import longform_enrichment as longform
          from source_presentation import generic_sources_markup

          candidate = scraper.Candidate(
              source_name="Greater Manchester Police",
              source_url="https://example.test/police-appeal",
              source_title="Police appeal after collision closes road in Rochdale",
              source_summary=(
                  "Officers appealed for witnesses after a collision in Rochdale on Monday evening. "
                  "A man was taken to hospital and drivers were asked to provide dashcam footage."
              ),
              source_published_at="2026-07-09T18:00:00Z",
              area="rochdale",
              category="crime",
              source_body_excerpt=(
                  "The road was temporarily closed while emergency services attended. "
                  "Police said enquiries were continuing and asked witnesses to contact them."
              ),
          )
          source_text = candidate.source_title + " " + candidate.source_summary + " " + candidate.source_body_excerpt
          preliminary = {
              "publishable": True,
              "title": "Witness appeal follows Rochdale road collision",
              "excerpt": (
                  "Police are asking witnesses and drivers with dashcam footage to come forward "
                  "after a collision temporarily closed a Rochdale road."
              ),
              "paragraphs": [
                  "Police have appealed for information after a collision in Rochdale on Monday evening left one man needing hospital treatment.",
                  "Emergency services attended and the road was closed for a period while officers began enquiries and managed the scene.",
                  "Investigators want to hear from witnesses and motorists whose dashcam footage may show events before, during or immediately after the crash or on nearby roads.",
              ],
          }
          assert not scraper.draft_quality_issues(preliminary, source_text, candidate), scraper.draft_quality_issues(preliminary, source_text, candidate)

          records = [{
              "name": "Official notice",
              "url": "https://example.test/works",
              "title": "Temporary Rochdale town-centre road arrangements announced",
              "summary": (
                  "Rochdale Council said temporary arrangements would begin on Monday near Riverside "
                  "and Yorkshire Street while planned public-realm work was completed."
              ),
              "body_excerpt": (
                  "Pedestrian access will remain available. Traders have been informed and signed "
                  "diversions will guide drivers around the affected section. The council expects the "
                  "work to continue during the week and advised visitors to allow extra time."
              ),
          }]
          paragraphs = [
              "Temporary traffic arrangements will begin in Rochdale town centre on Monday as planned public-realm work moves into its next phase near Riverside and Yorkshire Street. The council has advised drivers to expect changes around the affected section while contractors are on site.",
              "Pedestrian access is expected to remain available throughout the work, allowing people to reach shops and other town-centre destinations. Traders have been informed about the arrangements so they can prepare for changes to vehicle access and deliveries during the working period.",
              "Signed diversions will direct motorists around the closure rather than leaving drivers to find alternative routes without guidance. Visitors travelling through the centre have been encouraged to allow additional time, particularly when activity is taking place close to the main shopping area.",
              "The scheme forms part of planned improvements to the public space rather than an emergency response. In practical terms, public-realm work can include changes to paving, access, street furniture or the way traffic and pedestrians move through an area, depending on the approved programme.",
              "The council expects the work to continue during the week, although the precise effect on individual journeys may vary as the site progresses. Residents, businesses and visitors should follow temporary signs and any later official travel information before setting out for the town centre.",
          ]
          draft = {
              "publishable": True,
              "title": "Temporary traffic arrangements planned near Rochdale Riverside",
              "excerpt": (
                  "Drivers and town-centre visitors are being advised to allow extra time when temporary "
                  "arrangements begin near Riverside and Yorkshire Street on Monday."
              ),
              "paragraphs": paragraphs,
              "reason": "Grounded long-form report.",
          }
          article = {"title": "Town-centre works", "category": "traffic", "area": "rochdale", "content_html": ""}
          assert longform.word_count(" ".join(paragraphs)) >= 200
          assert not longform.quality_issues(draft, article, records), longform.quality_issues(draft, article, records)

          markup = generic_sources_markup({
              "source_url": "https://example.test/one",
              "source_urls": ["https://example.test/one", "https://example.test/two"],
          })
          assert "<details" in markup
          assert "<summary><span>Sources</span></summary>" in markup
          assert "Sources used:" not in markup
          print("Validation passed.")
          PY

      - name: Rebuild all articles from combined evidence
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          ARTICLE_MIN_WORDS: "200"
          ARTICLE_TARGET_MIN_WORDS: "230"
          ARTICLE_TARGET_MAX_WORDS: "420"
          LONGFORM_MAX_PER_RUN: "180"
          LONGFORM_MAX_SOURCES: "12"
          LONGFORM_WORKERS: "4"
          MAX_AI_ARTICLES_PER_RUN: "50"
          MAX_AI_ARTICLES_INITIAL: "100"
          AI_WORKERS: "5"
          REQUEST_TIMEOUT: "20"
        run: |
          test -n "$OPENAI_API_KEY" || { echo "OPENAI_API_KEY is missing"; exit 1; }
          python scraper/longform_enrichment.py
          python scraper/scraper.py
          python scraper/generate_pages.py

      - name: Verify every public article is at least 200 words
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from bs4 import BeautifulSoup
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          published = [article for article in articles if str(article.get("status") or "published") == "published"]
          short = []
          for article in published:
              text = BeautifulSoup(str(article.get("content_html") or ""), "lxml").get_text(" ", strip=True)
              words = len(re.findall(r"\b[\w’'-]+\b", text))
              if words < 200:
                  short.append((article.get("title"), words))
          if short:
              raise SystemExit("Published articles below 200 words: " + "; ".join(f"{title} ({words})" for title, words in short[:20]))

          frontpage = json.loads(Path("articles/frontpage.json").read_text(encoding="utf-8"))
          if int(frontpage.get("count") or 0) < 30:
              raise SystemExit(f"Front page contains only {frontpage.get('count')} articles.")
          index_text = Path("index.html").read_text(encoding="utf-8")
          if "Sources used:" in index_text:
              raise SystemExit("The old visible source-list label remains in index.html.")
          if "article-sources-disclosure" not in index_text:
              raise SystemExit("The discreet Sources disclosure is missing.")
          print(f"Verified {len(published)} published articles and {frontpage.get('count')} front-page stories.")
          PY

      - name: Commit long-form system and rebuilt site
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add \
            scraper/scraper.py \
            scraper/longform_enrichment.py \
            scraper/frontpage_pipeline.py \
            scraper/generate_pages.py \
            scraper/source_presentation.py \
            index.html \
            assets/css/site.css \
            articles.json \
            articles/frontpage.json \
            scraper_status.json \
            sitemap.xml \
            articles \
            assets/img/generated || true

          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git commit -m "Generate 200-word multi-source articles with discreet citations"
          git pull --rebase origin main
          git push origin HEAD:main
