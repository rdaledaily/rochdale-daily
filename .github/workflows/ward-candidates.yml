name: Ward photo candidates

# Fetches candidate photographs for each of the 20 Rochdale wards and builds a
# contact sheet at assets/img/review/review.html.
#
# This touches nothing the site uses. It is review material: you look through
# the sheet and copy whatever you want into assets/img/cards/ yourself. No image
# is applied to a story automatically.
#
# Run once with "download" off to see what it finds, then again with it on.

on:
  workflow_dispatch:
    inputs:
      download:
        description: "Fetch the images and build the contact sheet"
        type: boolean
        default: false
      only:
        description: "Optional filter, e.g. castleton — blank for all 20 wards"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: rd-ward-candidates
  cancel-in-progress: false

jobs:
  shortlist:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: python -m pip install --no-cache-dir "Pillow>=10,<13"

      - name: Fetch candidates
        run: |
          python scraper/fetch_area_shortlist.py \
            ${{ inputs.download && '--download' || '' }} \
            ${{ inputs.only != '' && format('--only {0}', inputs.only) || '' }}

      - name: Commit the review folder
        if: ${{ inputs.download }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/img/review

          if git diff --cached --quiet; then
            echo "Nothing new."
            exit 0
          fi

          git commit -m "Add ward photo candidates for review"
          git push origin "HEAD:${GITHUB_REF_NAME}"
