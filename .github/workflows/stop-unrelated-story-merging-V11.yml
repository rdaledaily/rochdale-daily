      - name: Test exact cross-story regression
        shell: bash
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")

          from story_identity import dedupe_article_records, same_story

          farm_fire = {
              "title": "Murder investigation launched following fatal fire at Rochdale farm",
              "excerpt": (
                  "Emergency services were called to Tunshill Farm in Milnrow on "
                  "9 July 2026. A woman was pronounced dead at the scene."
              ),
              "content_html": (
                  "<p>A woman died following a fire at Tunshill Farm in Milnrow "
                  "on 9 July 2026. A person was arrested.</p>"
              ),
              "category": "crime",
              "area": "milnrow",
              "event_location": "Tunshill Farm, Milnrow",
              "published_at": "2026-07-09T10:00:00Z",
              "source_url": "https://example.com/farm-fire",
          }

          shabir = {
              "title": "Pakistan refuses deportation of Shabir Ahmed",
              "excerpt": (
                  "Pakistan has declined to accept the deportation of Shabir Ahmed, "
                  "described in reports as a Rochdale grooming-gang leader."
              ),
              "content_html": (
                  "<p>The UK government is considering its next step after Pakistan "
                  "refused to accept Shabir Ahmed.</p>"
              ),
              "category": "crime",
              "area": "rochdale",
              "published_at": "2026-07-09T12:00:00Z",
              "source_url": "https://example.com/shabir-deportation",
          }

          shabir_update = {
              "title": "UK considers law change after Shabir Ahmed deportation refusal",
              "excerpt": (
                  "Ministers are considering legal changes after Pakistan declined "
                  "to accept Shabir Ahmed."
              ),
              "content_html": (
                  "<p>Shabir Ahmed remains the subject of a deportation dispute "
                  "following his release from prison.</p>"
              ),
              "category": "crime",
              "area": "rochdale",
              "published_at": "2026-07-09T15:00:00Z",
              "source_url": "https://example.com/shabir-law-change",
          }

          assert not same_story(farm_fire, shabir)
          assert same_story(shabir, shabir_update)
          result = dedupe_article_records([farm_fire, shabir, shabir_update])
          assert len(result) == 2, len(result)

          combined = " ".join(
              str(value)
              for article in result
              for value in (
                  article.get("title"),
                  article.get("excerpt"),
                  article.get("content_html"),
              )
          ).lower()
          assert not (
              "fatal fire" in combined
              and "shabir ahmed" in next(
                  str(article.get("excerpt") or "").lower()
                  for article in result
                  if "fatal fire" in str(article.get("title") or "").lower()
              )
          )

          print("Farm-fire/Shabir cross-story regression passed.")
          PY

      - name: Run existing story identity tests
        run: |
          python scraper/test_story_identity.py

      - name: Commit permanent merge protection
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"

          git add             scraper/story_identity.py             scraper/repair_cross_story_merges.py

          if ! git diff --cached --quiet; then
            git commit -m "Require specific evidence before merging stories"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "Strict merge protection is already installed."
          fi

      - name: Remove existing cross-story contamination
        run: |
          python scraper/repair_cross_story_merges.py

      - name: Regenerate article pages and front page
        run: |
          python scraper/generate_pages.py

      - name: Validate cleaned public feed
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          offenders = []

          for article in articles:
              title = str(article.get("title") or "").lower()
              excerpt = str(article.get("excerpt") or article.get("summary") or "").lower()
              body = str(article.get("content_html") or "").lower()
              combined = " ".join([title, excerpt, body])

              has_shabir = "shabir ahmed" in combined
              has_farm_fire = (
                  "farm" in combined
                  and ("fire" in combined or "blaze" in combined)
                  and ("murder" in combined or "died" in combined or "dead" in combined)
              )
              if has_shabir and has_farm_fire:
                  offenders.append(article.get("title") or "Untitled")

          if offenders:
              raise SystemExit(
                  "Cross-story contamination remains: " + "; ".join(offenders[:10])
              )

          frontpage = json.loads(
              Path("articles/frontpage.json").read_text(encoding="utf-8")
          )
          if len(frontpage.get("articles", [])) < 30:
              raise SystemExit("Front page fell below 30 stories after cleanup.")

          print(
              f"Validated {len(articles)} clean articles and "
              f"{len(frontpage.get('articles', []))} front-page stories."
          )
          PY

      - name: Commit cleaned site
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"

          git add             articles.json             scraper_status.json             articles/frontpage.json             articles             sitemap.xml             assets/img/generated || true

          if git diff --cached --quiet; then
            echo "No contaminated public records remained."
            exit 0
          fi

          git commit -m "Remove unrelated merged farm-fire and deportation story"
          git pull --rebase origin main
          git push origin HEAD:main
