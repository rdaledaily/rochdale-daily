name: Apply subtle source attribution

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: subtle-source-attribution
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4

      - name: Apply source-presentation patch
        run: python scraper/apply_subtle_source_attribution.py

      - name: Validate Python
        run: |
          python -m py_compile \
            scraper/source_presentation.py \
            scraper/apply_subtle_source_attribution.py \
            scraper/scraper.py \
            scraper/generate_pages.py

      - name: Regenerate all article pages
        run: python scraper/generate_pages.py

      - name: Validate public presentation
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path
          from bs4 import BeautifulSoup

          blocked_visible_name = "roch valley radio"
          articles_path = Path("articles.json")
          payload = json.loads(articles_path.read_text(encoding="utf-8"))
          articles = payload if isinstance(payload, list) else payload.get("articles", [])

          visible_fields = (
              "title",
              "excerpt",
              "summary",
              "content_html",
              "image_credit",
              "source_name",
              "legal_disclaimer",
              "right_to_reply",
          )

          failures = []
          retained_source_links = 0

          for article in articles:
              if not isinstance(article, dict):
                  continue

              for field in visible_fields:
                  if blocked_visible_name in str(article.get(field) or "").casefold():
                      failures.append(
                          f"articles.json: {article.get('slug')} field={field}"
                      )

              for name in article.get("source_names") or []:
                  if blocked_visible_name in str(name).casefold():
                      failures.append(
                          f"articles.json: {article.get('slug')} source_names"
                      )

              source_urls = [article.get("source_url")] + list(
                  article.get("source_urls") or []
              )
              if any("rochvalleyradio.com" in str(url or "").casefold() for url in source_urls):
                  retained_source_links += 1

          for page in Path("articles").glob("*.html"):
              html = page.read_text(encoding="utf-8", errors="ignore")
              visible_text = BeautifulSoup(html, "html.parser").get_text(" ", strip=True)
              if blocked_visible_name in visible_text.casefold():
                  failures.append(f"visible article text: {page}")

          generator = Path("scraper/generate_pages.py").read_text(encoding="utf-8")
          scraper = Path("scraper/scraper.py").read_text(encoding="utf-8")

          required = {
              "generic source footer": "generic_sources_markup",
              "article sanitiser": "sanitise_article",
              "candidate cleaner": "clean_candidate_public_text",
              "subtle image rule": "is_subtle_source",
          }
          for label, marker in required.items():
              if marker not in generator and marker not in scraper:
                  failures.append(f"missing {label}: {marker}")

          if failures:
              raise SystemExit("\n".join(failures))

          print("Public presentation validation passed.")
          print(
              f"Existing articles retaining a generic original-source URL: "
              f"{retained_source_links}"
          )
          PY

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            scraper/source_presentation.py \
            scraper/apply_subtle_source_attribution.py \
            scraper/scraper.py \
            scraper/generate_pages.py \
            articles.json \
            articles \
            sitemap.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Use subtle generic source attribution"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
