      - name: Validate code and category rules
        shell: bash
        run: |
          python -m py_compile             scraper/editorial_upgrade.py             scraper/scraper.py             scraper/frontpage_pipeline.py             scraper/search_queries.py             scraper/source_presentation.py             scraper/generate_pages.py
          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")
          from editorial_upgrade import deterministic_category

          assert deterministic_category("Calls for reform after Rochdale rape case") == "crime"
          assert deterministic_category("Kirkholt Pantry celebrates ten years helping families") == "community"
          assert deterministic_category("M62 collision closes lane near Rochdale") == "traffic"
          assert deterministic_category("Rochdale AFC signs new striker") == "sport"
          print("Editorial category tests passed.")
          PY

      - name: Run upgraded journalism pipeline
        run: |
          python scraper/scraper.py
          python scraper/generate_pages.py

      - name: Validate public output
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          frontpage = json.loads(Path("articles/frontpage.json").read_text(encoding="utf-8"))
          if len(frontpage.get("articles", [])) < 30:
              raise SystemExit("Front page contains fewer than 30 articles.")

          def words(article):
              body = re.sub(r"<[^>]+>", " ", str(article.get("content_html") or ""))
              return len(re.findall(r"\b[\w’'-]+\b", body))

          generated = [
              article for article in articles
              if str(article.get("publication_route") or "").startswith("ai")
          ]
          short_generated = [
              article.get("title", "Untitled")
              for article in generated
              if words(article) < 200
          ]
          if short_generated:
              raise SystemExit("New AI articles below 200 words: " + "; ".join(short_generated[:10]))

          for article in articles:
              title = str(article.get("title") or "").lower()
              category = str(article.get("category") or "")
              if "kirkholt pantry" in title and category != "community":
                  raise SystemExit("Kirkholt Pantry is not categorised as community.")
              if "rape" in title and category == "sport":
                  raise SystemExit("A rape-related story remains categorised as sport.")

          sample_pages = list(Path("articles").glob("*.html"))
          if sample_pages:
              sample = sample_pages[0].read_text(encoding="utf-8")
              required = [
                  '"NewsArticle"',
                  'rel="canonical"',
                  'class="article-sources"',
                  'class="comment-signup-box"',
                  'share-icon-button',
              ]
              missing = [item for item in required if item not in sample]
              if missing:
                  raise SystemExit("Generated article page is missing: " + ", ".join(missing))

          print(f"Validated {len(articles)} articles and {len(frontpage.get('articles', []))} front-page stories.")
          PY

      - name: Commit upgraded site
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add             scraper/editorial_upgrade.py             scraper/scraper.py             scraper/frontpage_pipeline.py             scraper/search_queries.py             scraper/source_presentation.py             scraper/generate_pages.py             assets/css/site.css             index.html             articles.json             scraper_status.json             articles/frontpage.json             articles             sitemap.xml             assets/img/generated || true

          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git commit -m "Upgrade editorial quality, categories, traffic, comments and SEO"
          git pull --rebase origin main
          git push origin HEAD:main
