        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install upgrade dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 dateparser

