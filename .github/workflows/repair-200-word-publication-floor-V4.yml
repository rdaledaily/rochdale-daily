      - name: Test merge and categorisation rules
        shell: bash
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")

          from editorial_upgrade import deterministic_category
          from story_identity import merge_article_records

          assert deterministic_category(
              "Kirkholt Pantry continues helping local families"
          ) == "community"

          short = {
              "id": "story-1",
              "slug": "story-1",
              "title": "New update",
              "content_html": "<p>Short update.</p>",
              "excerpt": "Short update.",
              "published_at": "2026-07-09T21:00:00Z",
              "source_url": "https://example.com/new",
              "source_name": "New source",
              "category": "traffic",
          }
          long_body = " ".join(["Grounded reporting sentence"] * 80)
          long = {
              "id": "story-old",
              "slug": "story-old",
              "title": "Earlier full report",
              "content_html": f"<p>{long_body}</p>",
              "excerpt": "A detailed earlier report.",
              "published_at": "2026-07-09T20:00:00Z",
              "source_url": "https://example.com/old",
              "source_name": "Old source",
              "category": "traffic",
          }
          merged = merge_article_records(long, short)
          assert "Grounded reporting sentence" in merged["content_html"]
          print("V4 merge and category tests passed.")
          PY

      - name: Commit permanent code fixes
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add scraper/story_identity.py scraper/scraper.py scraper/frontpage_pipeline.py
          if ! git diff --cached --quiet; then
            git commit -m "Preserve long-form bodies and enforce 200-word floor"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "Permanent V4 code fixes are already installed."
          fi

      - name: Run journalism pipeline
        run: |
          python scraper/scraper.py

      - name: Normalise all article categories
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          sys.path.insert(0, "scraper")
          from editorial_upgrade import deterministic_category

          path = Path("articles.json")
          articles = json.loads(path.read_text(encoding="utf-8"))
          changed = 0
          for article in articles:
              text = " ".join(
                  str(article.get(field) or "")
                  for field in (
                      "title", "excerpt", "summary",
                      "content_html", "event_location",
                  )
              )
              if re.search(
                  r"\b(?:kirkholt pantry|community pantry|food bank|foodbank|pantry)\b",
                  text,
                  re.I,
              ):
                  category = "community"
              else:
                  category = deterministic_category(
                      text,
                      str(article.get("category") or "news"),
                  )
                  if (
                      category == "news"
                      and str(article.get("source_kind") or "").lower() == "event"
                  ):
                      category = "events"

              if article.get("category") != category or article.get("types") != [category]:
                  article["category"] = category
                  article["types"] = [category]
                  article["police_matter"] = category == "crime"
                  changed += 1

          path.write_text(
              json.dumps(articles, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"Normalised categories on {changed} article(s).")
          PY

      - name: Rebuild front page and static articles
        run: |
          python scraper/generate_pages.py

      - name: Validate public output
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          frontpage = json.loads(Path("articles/frontpage.json").read_text(encoding="utf-8"))

          if len(frontpage.get("articles", [])) < 30:
              raise SystemExit("Front page contains fewer than 30 articles.")

          def word_count(article):
              body = re.sub(r"<[^>]+>", " ", str(article.get("content_html") or ""))
              return len(re.findall(r"\b[\w’'-]+\b", body))

          short_news = [
              article.get("title", "Untitled")
              for article in articles
              if str(article.get("source_kind") or "article") != "event"
              and word_count(article) < 200
          ]
          if short_news:
              raise SystemExit(
                  "Public news articles below 200 words remain: "
                  + "; ".join(short_news[:10])
              )

          category_errors = []
          for article in articles:
              title = str(article.get("title") or "").lower()
              category = str(article.get("category") or "")
              if (
                  re.search(
                      r"\b(?:kirkholt pantry|community pantry|food bank|foodbank|pantry)\b",
                      title,
                  )
                  and category != "community"
              ):
                  category_errors.append(
                      f"{article.get('title')}: expected community, got {category}"
                  )
              if (
                  re.search(r"\b(?:rape|sexual assault|grooming)\b", title)
                  and category != "crime"
              ):
                  category_errors.append(
                      f"{article.get('title')}: expected crime, got {category}"
                  )
          if category_errors:
              raise SystemExit(
                  "Category errors remain: " + "; ".join(category_errors[:10])
              )

          print(
              f"Validated {len(articles)} retained articles and "
              f"{len(frontpage.get('articles', []))} front-page stories."
          )
          PY

      - name: Commit regenerated site
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add             articles.json             scraper_status.json             articles/frontpage.json             articles             sitemap.xml             assets/img/generated || true

          if git diff --cached --quiet; then
            echo "No regenerated site changes to commit."
            exit 0
          fi

          git commit -m "Publish long-form balanced Rochdale Daily site"
          git pull --rebase origin main
          git push origin HEAD:main
