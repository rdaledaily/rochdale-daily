      - name: Test lexical and evidence rules
        shell: bash
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")

          from house_style import STYLE_VERSION, style_issues
          from source_grounded_copydesk import evidence_issues

          assert STYLE_VERSION == "rochdale-precision-desk-v5"

          bad = {
              "publishable": True,
              "title": "Mother dies following Rochdale farm blaze",
              "excerpt": "A suspect was arrested after emergency services were summoned to the scene.",
              "paragraphs": [
                  "A mother has tragically died after the blaze erupted.",
                  "Detectives are working diligently to piece together the events leading up to the incident.",
                  "Local residents expressed profound shock and sorrow.",
                  "The council is expected to convene a meeting and implement safety measures.",
                  "Police are actively appealing for witnesses.",
              ],
          }
          evidence = (
              "Emergency services were called to a farm in Milnrow. "
              "A woman died at the scene. A person was arrested. "
              "Greater Manchester Police launched a murder investigation."
          )
          issues = evidence_issues(bad, evidence)
          assert issues
          assert any("suspect" in issue.lower() for issue in issues)

          wrong_reference = {
              "publishable": True,
              "title": "Woman dies following Milnrow farm fire",
              "excerpt": "A murder investigation is under way after a fire at a farm.",
              "paragraphs": [
                  "Emergency services were called to a farm in Milnrow.",
                  "The woman was pronounced dead at the scene.",
                  "A person was arrested and detectives are investigating.",
                  "Anyone with information can find police contact details below.",
                  "Our thoughts are with the family and all those affected.",
              ],
          }
          wrong_issues = evidence_issues(wrong_reference, evidence)
          assert any(
              "a woman" in issue.lower() and "the woman" in issue.lower()
              for issue in wrong_issues
          ), wrong_issues

          correct_reference = {
              "publishable": True,
              "title": "Woman dies following Milnrow farm fire",
              "excerpt": "A murder investigation is under way after a fire at a farm.",
              "paragraphs": [
                  "Emergency services were called to a farm in Milnrow.",
                  "A woman was pronounced dead at the scene.",
                  "A person was arrested and detectives are investigating.",
                  "Anyone with information can find police contact details below.",
                  "Our thoughts are with the family and all those affected.",
              ],
          }
          assert not any(
              "a woman" in issue.lower() and "the woman" in issue.lower()
              for issue in evidence_issues(correct_reference, evidence)
          )
          assert any("community" in issue.lower() for issue in issues)
          assert any("council" in issue.lower() for issue in issues)
          assert style_issues(bad)
          print("V7 lexical and evidence tests passed.")
          PY

