      - name: Audit certified precision articles
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          articles = json.loads(Path("articles.json").read_text(encoding="utf-8"))
          frontpage = json.loads(Path("articles/frontpage.json").read_text(encoding="utf-8"))

          if len(frontpage.get("articles", [])) < 30:
              raise SystemExit("Front page contains fewer than 30 stories.")

          certified = [
              article for article in articles
              if article.get("editorial_style_version") == "rochdale-precision-desk-v5"
              and article.get("source_grounding_status") == "passed"
          ]
          if not certified:
              raise SystemExit("No articles passed the source-grounded precision desk.")

          bad_language = re.compile(
              r"\b(?:working diligently|summoned to the scene|the blaze erupted|"
              r"pronounced dead at the location|profound shock and sorrow|"
              r"close-knit nature|harrowing time|local council is expected to convene|"
              r"local authorities will implement)\b",
              re.I,
          )
          offenders = [
              article.get("title", "Untitled")
              for article in certified
              if bad_language.search(
                  " ".join(
                      str(article.get(field) or "")
                      for field in ("title", "excerpt", "content_html")
                  )
              )
          ]
          if offenders:
              raise SystemExit(
                  "Imprecise language remains in certified articles: "
                  + "; ".join(offenders[:10])
              )

          import sys
          sys.path.insert(0, "scraper")
          from house_style import first_reference_issues

          grammar_offenders = []
          for article in certified:
              paragraphs = re.findall(
                  r"<p(?:\s+[^>]*)?>(.*?)</p>",
                  str(article.get("content_html") or ""),
                  flags=re.I | re.S,
              )
              draft = {
                  "title": article.get("title", ""),
                  "excerpt": article.get("excerpt", ""),
                  "paragraphs": [
                      re.sub(r"<[^>]+>", " ", paragraph)
                      for paragraph in paragraphs
                      if "ongoing-label" not in paragraph
                  ],
              }
              if first_reference_issues(draft):
                  grammar_offenders.append(article.get("title", "Untitled"))
          if grammar_offenders:
              raise SystemExit(
                  "Incorrect anonymous-person first reference remains: "
                  + "; ".join(grammar_offenders[:10])
              )

          wrong_label = [
              article.get("title", "Untitled")
              for article in certified
              if article.get("is_ongoing")
              and "This report brings together developments from multiple sources."
                  not in str(article.get("content_html") or "")
          ]
          if wrong_label:
              raise SystemExit(
                  "Ongoing-story wording is incorrect: " + "; ".join(wrong_label[:10])
              )

          held = [
              article for article in articles
              if article.get("style_rewrite_status") in ('held-for-source-grounding', 'held-after-failed-grounding')
          ]
          print(
              f"Certified {len(certified)} source-grounded articles; "
              f"held {len(held)} high-risk articles pending stronger source text; "
              f"front page contains {len(frontpage.get('articles', []))} stories."
          )
          PY

      - name: Commit precision-edited articles
        shell: bash
        run: |
          git config user.name "Rochdale Daily Automation"
          git config user.email "actions@users.noreply.github.com"
          git add             articles.json             scraper_status.json             articles/frontpage.json             articles             sitemap.xml             assets/img/generated || true

          if git diff --cached --quiet; then
            echo "No precision-edited article changes to commit."
            exit 0
          fi

          git commit -m "Publish source-grounded precision-edited articles V8"
          git pull --rebase origin main
          git push origin HEAD:main
